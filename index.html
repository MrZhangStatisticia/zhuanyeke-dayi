<script>
(function(){
var KB=JSON.parse(document.getElementById('data-kb').textContent);
var IMG=JSON.parse(document.getElementById('data-img').textContent);
var cur='s',searchMode=!1,mode='detail';
var $q=document.getElementById('q'),$sr=document.getElementById('searchResults');
var $cs=document.getElementById('content-s'),$ca=document.getElementById('content-a');
var $ts=document.getElementById('tree-s'),$ta=document.getElementById('tree-a');
var $btnD=document.getElementById('btn-detail'),$btnT=document.getElementById('btn-tree');
var tabs=document.querySelectorAll('.tab');

function img(subj,page){
  if(!page)return null;
  var k=(subj==='s'?'统计学':'国民经济核算')+'_p'+(page<10?'0':'')+page;
  return IMG[k]||null;
}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function hasF(t){var kw=['公式','Σ','√','≤','≥','σ','μ','α','β','H₀','H₁','Δ','∑','≈','≠'];return kw.some(function(k){return t.indexOf(k)!==-1})}

// ====== NAVIGATION ======
function buildNav(){
  var subjs={s:'统计学',a:'国民经济核算'};
  for(var sk in subjs){
    var s=subjs[sk],data=KB[s];
    if(!data)continue;
    var nav=document.getElementById('nav-'+sk),h='';
    data.forEach(function(ch,chi){
      var im=img(sk,ch.page);
      h+='<div style="display:flex;align-items:center;gap:.15rem">';
      h+='<a class="ch-link" data-sk="'+sk+'" data-chi="'+chi+'">'+esc(ch.title)+'</a>';
      if(im)h+='<span class="page-btn" data-img="'+im+'" title="原书第'+ch.page+'页">📄</span>';
      h+='</div>';
      ch.sections.forEach(function(sec,si){
        h+='<a class="sec-link" data-sk="'+sk+'" data-chi="'+chi+'" data-si="'+si+'">'+esc(sec.number)+' '+esc(sec.title)+'</a>';
      });
    });
    nav.innerHTML=h;
  }
  document.getElementById('sidebar').addEventListener('click',function(e){
    var b=e.target.closest('.page-btn');
    if(b){showModal(b.dataset.img);return}
    var a=e.target.closest('a');
    if(!a)return;
    switchTo(a.dataset.sk);
    setTimeout(function(){
      var si=a.dataset.si!==undefined?parseInt(a.dataset.si):undefined;
      if(si!==undefined)scrollTo(a.dataset.sk,parseInt(a.dataset.chi),si);
      else scrollTo(a.dataset.sk,parseInt(a.dataset.chi));
    },100);
  });
}

// ====== KNOWLEDGE TREE ======
function buildTree(sk,container){
  var s=sk==='s'?'统计学':'国民经济核算',data=KB[s];
  if(!data)return;
  var h='';
  data.forEach(function(ch,chi){
    var im=img(sk,ch.page);
    h+='<div class="tree-node">';
    h+='<div class="tree-label tree-toggle" data-sk="'+sk+'" data-chi="'+chi+'">';
    h+='<span class="arrow">▶</span><span class="tree-chapter">'+esc(ch.title)+'</span>';
    if(im)h+=' <span class="page-btn" data-img="'+im+'">📄</span>';
    h+='</div>';
    h+='<div class="tree-children">';
    ch.sections.forEach(function(sec,si){
      var sim=img(sk,sec.page||ch.page);
      h+='<div class="tree-node">';
      h+='<div class="tree-label tree-section" data-sk="'+sk+'" data-chi="'+chi+'" data-si="'+si+'" style="cursor:pointer">';
      h+=esc(sec.number)+' '+esc(sec.title);
      if(sim&&sec.page!==ch.page)h+=' <span class="page-btn" data-img="'+sim+'">📄</span>';
      h+='</div></div>';
    });
    h+='</div></div>';
  });
  container.innerHTML=h;
  // Toggle chapter expand/collapse
  container.querySelectorAll('.tree-toggle').forEach(function(el){
    el.addEventListener('click',function(e){
      if(e.target.closest('.page-btn'))return;
      var children=this.nextElementSibling;
      if(children){
        children.classList.toggle('open');
        this.querySelector('.arrow').classList.toggle('open');
      }
    });
  });
  // Section click -> go to detail
  container.querySelectorAll('.tree-section').forEach(function(el){
    el.addEventListener('click',function(e){
      if(e.target.closest('.page-btn'))return;
      switchTo(this.dataset.sk);
      setMode('detail');
      setTimeout(function(){scrollTo(el.dataset.sk,parseInt(el.dataset.chi),parseInt(el.dataset.si))},150);
    });
  });
  // Page image buttons
  container.querySelectorAll('.page-btn').forEach(function(el){
    el.addEventListener('click',function(e){e.stopPropagation();showModal(this.dataset.img)});
  });
}

function setMode(m){
  mode=m;
  $btnD.classList.toggle('active',m==='detail');
  $btnT.classList.toggle('active',m==='tree');
  var sk=cur;
  if(m==='detail'){
    $ts.classList.remove('show');$ta.classList.remove('show');
    $cs.classList.add('visible');$ca.classList.add('visible');
    $cs.classList.toggle('visible',sk==='s');$ca.classList.toggle('visible',sk==='a');
    renderDetail(sk);
  }else{
    $cs.classList.remove('visible');$ca.classList.remove('visible');
    $ts.classList.toggle('show',sk==='s');$ta.classList.toggle('show',sk==='a');
    if(sk==='s'&&!$ts.innerHTML)buildTree('s',$ts);
    if(sk==='a'&&!$ta.innerHTML)buildTree('a',$ta);
  }
}

// ====== SUBJECT SWITCH ======
function switchTo(sk){
  if(cur===sk&&!searchMode)return;
  cur=sk;
  tabs.forEach(function(t){t.classList.toggle('active',t.dataset.sk===sk)});
  exitSearch();
  if(mode==='detail'){
    $cs.classList.toggle('visible',sk==='s');$ca.classList.toggle('visible',sk==='a');
    renderDetail(sk);
  }else{
    $ts.classList.toggle('show',sk==='s');$ta.classList.toggle('show',sk==='a');
    if(sk==='s'&&!$ts.innerHTML)buildTree('s',$ts);
    if(sk==='a'&&!$ta.innerHTML)buildTree('a',$ta);
  }
}

// ====== DETAIL RENDER ======
function renderDetail(sk){
  var s=sk==='s'?'统计学':'国民经济核算',data=KB[s];
  if(!data)return;
  var c=sk==='s'?$cs:$ca;
  if(c.innerHTML)return;
  var h='';
  data.forEach(function(ch,chi){
    var im=img(sk,ch.page);
    h+='<div class="chapter-card" id="ch-'+sk+'-'+chi+'">';
    h+='<h2>'+esc(ch.title);
    if(im)h+=' <span class="page-btn" data-img="'+im+'">📄 原书截图（第'+ch.page+'页）</span>';
    h+='</h2>';
    ch.sections.forEach(function(sec,si){
      var sim=img(sk,sec.page||ch.page);
      h+='<div class="section-block" id="sec-'+sk+'-'+chi+'-'+si+'">';
      h+='<h3>'+esc(sec.number)+' '+esc(sec.title);
      if(sim&&sec.page!==ch.page)h+=' <span class="page-btn" data-img="'+sim+'">📄 p'+sec.page+'</span>';
      h+='</h3>';
      h+='<div class="section-content">'+esc(sec.content)+'</div>';
      if(sim&&hasF(sec.content))h+='<div class="formula-note">📐 含公式，<a href="#" class="flink" data-img="'+sim+'" style="color:#e65100">点击查看原书截图</a></div>';
      h+='</div>';
    });
    h+='</div>';
  });
  c.innerHTML=h;
  c.querySelectorAll('.page-btn').forEach(function(el){el.onclick=function(){showModal(this.dataset.img)}});
  c.querySelectorAll('.flink').forEach(function(el){el.onclick=function(e){e.preventDefault();showModal(this.dataset.img)}});
}

// ====== MODAL (fixed close button) ======
function showModal(src){
  document.getElementById('modalImg').src=src;
  document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show')}
document.getElementById('modalClose').addEventListener('click',function(e){e.stopPropagation();closeModal()});
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal()});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal()});

// ====== SEARCH ======
function exitSearch(){
  searchMode=!1;$q.value='';$sr.classList.remove('show');$sr.innerHTML='';
}
function doSearch(){
  var q=$q.value.trim();
  if(!q){exitSearch();setMode(mode);return}
  searchMode=!0;$cs.classList.remove('visible');$ca.classList.remove('visible');$ts.classList.remove('show');$ta.classList.remove('show');$sr.classList.add('show');
  var ql=q.toLowerCase(),results=[];
  var subjs={s:'统计学',a:'国民经济核算'};
  for(var sk in subjs){
    var s=subjs[sk],data=KB[s];
    if(!data)continue;
    data.forEach(function(ch,chi){
      ch.sections.forEach(function(sec,si){
        var ft=sec.number+' '+sec.title+' '+sec.content;
        if(ft.toLowerCase().indexOf(ql)!==-1){
          var ci=sec.content.toLowerCase().indexOf(ql);
          var sn=sec.content.substring(Math.max(0,ci-40),Math.min(sec.content.length,ci+q.length+80));
          if(ci>40)sn='...'+sn;
          if(ci+q.length+80<sec.content.length)sn+='...';
          results.push({sk:sk,chi:chi,si:si,chapter:ch.title,section:sec.number+' '+sec.title,snippet:sn,score:ft.toLowerCase().split(ql).length-1,page:sec.page||ch.page});
        }
      });
    });
  }
  results.sort(function(a,b){return b.score-a.score});
  if(!results.length){
    $sr.innerHTML='<div class="no-results"><p>未找到与 <strong>'+esc(q)+'</strong> 相关的内容</p></div>';
  }else{
    var h='<h3 style="margin-bottom:.7rem">找到 '+results.length+' 条结果</h3>';
    results.forEach(function(r){
      var tc=r.sk==='s'?'tag-s':'tag-a',sn=r.sk==='s'?'统计学':'国民经济核算';
      var im=img(r.sk,r.page);
      h+='<div class="result-item" data-sk="'+r.sk+'" data-chi="'+r.chi+'" data-si="'+r.si+'">';
      h+='<span class="tag '+tc+'">'+sn+'</span><span style="font-size:.72rem;color:#999">'+esc(r.chapter)+'</span>';
      if(im)h+=' <span class="page-btn" data-img="'+im+'" style="font-size:.6rem">📄</span>';
      h+='<h4>'+esc(r.section)+'</h4><p>'+esc(r.snippet)+'</p></div>';
    });
    $sr.innerHTML=h;
    $sr.querySelectorAll('.result-item').forEach(function(item){
      item.onclick=function(){setMode('detail');switchTo(this.dataset.sk);setTimeout(function(){scrollTo(item.dataset.sk,parseInt(item.dataset.chi),parseInt(item.dataset.si))},150)};
    });
    $sr.querySelectorAll('.page-btn').forEach(function(el){
      el.onclick=function(e){e.stopPropagation();showModal(this.dataset.img)};
    });
  }
}

function scrollTo(sk,chi,si){
  var el;
  if(si!==undefined)el=document.getElementById('sec-'+sk+'-'+chi+'-'+si);
  else el=document.getElementById('ch-'+sk+'-'+chi);
  if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
}

// ====== EVENT BINDINGS ======
$q.addEventListener('input',doSearch);
$btnD.addEventListener('click',function(){setMode('detail')});
$btnT.addEventListener('click',function(){setMode('tree')});
tabs.forEach(function(t){t.addEventListener('click',function(){switchTo(this.dataset.sk)})});

// ====== INIT ======
buildNav();
buildTree('s',$ts);
renderDetail('s');
setMode('tree'); // Default to tree view
})();
</script>
</body>
</html>
