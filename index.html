<script type="application/json" id="data-kb">{"统计学": [{"title": "第一章总论", "sections": [{"number": "1.1", "title": "什么是统计学", "content": "1.1 什么是统计学", "page": 1}, {"number": "1.1.1", "title": "统计的含义与本质", "content": "1.1.1 统计的含义与本质\n统计的含义：\n①“统计”一词可以有三种含义：统计活动、统计数据和统计学。\n②统计活动：对各种统计数据进行收集、整理并做出相应的推断、分析的活动。分为\n统计调查、统计整理和统计分析三个阶段。\n③统计数据：统计活动的对象和结果。通过统计活动获得的，用以表现研究现象特征\n的各种形式的数据。\n④统计学：系统地论述统计活动理论和方法的科学，是对统计活动及统计规律进行总\n结和理论概括的学说。\n⑤统计的本质：用数据说明问题，用数据反映真相。\n三种含义的关系：\n1 以统计数据为核心而紧密联系：\n2 统计数据与统计活动是统计成果与过程的关系；\n3 统计活动与统计学则是统计实践与理论的关系。", "page": 1}, {"number": "1.1.3", "title": "统计学的学科性质", "content": "1.1.3 统计学的学科性质", "page": 1}, {"number": "1.1.3", "title": ".1 统计学就其研究对象而言，具有数量性、总体性和差异性的特点", "content": "1.1.3.1 统计学就其研究对象而言，具有数量性、总体性和差异性的特点\n①数量性：通过定量研究、运用各种统计数据来体现所研究现象的数量特征，达到认\n识现象本质和规律的目的。\n②总体性：从所研究现象的总体出发，通过对现象总体中的构成元素，即个体，进行\n大量观察和综合分析，达到认识现象的总体数量特征的目的。\n③差异性：从所研究现象总体的每个个体之间的差异中概括出共同的、普遍的数量特\n征，并对差异情况做出必要的反映。", "page": 1}, {"number": "1.1.3", "title": ".3 统计学就其研究方式而言，具有描述性和推断性的特点", "content": "1.1.3.3 统计学就其研究方式而言，具有描述性和推断性的特点\n定义：\n①描述统计学：运用各种方法对研究现象进行观察调查，获取数据，进行汇总、分类\n和计算，并用表格、图形和综合指标的方式来加以显示。把各种真实描述所研究现象数量特\n征的理论和方法加以系统化。\n②推断统计学：在概率统计理论基础上，根据样本观测结果对总体数量特征做出估计\n或进行假设检验，以期对不确定事物做出定量的推断。把各种定量推断不确定事物的理论和\n方法加以系统化。\n二者关系：\n①描述统计学是基础，推断统计学是其深入和发展。\n②两者之间不是相互割裂的，而是你中有我、我中有你。\n③任何描述都是推断，任何推断也都是描述。\n④描述统计学与推断统计学相辅相成，在统计学中占有同等重要的地位。", "page": 1}, {"number": "1.1.4", "title": "统计学的作用（内容+扩展自编）", "content": "1.1.4 统计学的作用（内容+扩展自编）\n①为认识自然和社会提供了必需的方法和途径。\n②在指导生产活动过程中发挥着重要作用。\n③在社会经济管理活动中的作用更为显著。\n④为科学研究提供了有力手段", "page": 2}, {"number": "1.2", "title": "统计数据类型与研究方法", "content": "1.2 统计数据类型与研究方法", "page": 2}, {"number": "1.2.2", "title": "统计数据类型", "content": "1.2.2 统计数据类型", "page": 2}, {"number": "1.2.2", "title": ".1 按照所采用的计量尺度不同，可以分为定性数据与定量数据两类", "content": "1.2.2.1 按照所采用的计量尺度不同，可以分为定性数据与定量数据两类\n①定性数据：只能用文字或数字代码来表现事物的品质特征或属性特征的数据。分为\n定类数据与定序数据。\n②定量数据：用数值来表现事物数量特征的数据。分为定距数据与定比数据。\n③定类数据：按照分类尺度计量得到的结果。\n分类尺度：按照事物的某种属性对其进行平行分类。\n4 定序数据：按照顺序尺度计量所得到的数据。\n顺序尺度：对事物类别顺序所做的测量，数据表现为有序的类别。\n5 定距数据：用定距尺度计量所获得的数据。\n定距尺度：对事物类别或次序之间间距的测度。\n没有绝对零点，数据表现为数字。\n6 定比数据：用比率尺度计量所获得的数据。\n比率尺度：对事物类别和次序之间间距的测度。\n有绝对零点，数据表现为数字。", "page": 2}, {"number": "1.2.2", "title": ".2 按照其表现形式不同，可以分为绝对数、相对数和平均数三类", "content": "1.2.2.2 按照其表现形式不同，可以分为绝对数、相对数和平均数三类\n①绝对数：反映现象或事物绝对数量特征的数据，以最直观、最基本的形式体现现象\n或事物的外在数量特征。\n②相对数：反映现象或事物相对数量特征的数据，通过另外两个相关统计数据的对比\n来体现现象内部或之间的联系关系。\n③平均数：反映现象或事物平均数量特征的数据，体现现象某一方面的一般数量水平。", "page": 2}, {"number": "1.2.2", "title": ".5 按照其时间或空间状态不同，可以分为时序数据与截面数据两类", "content": "1.2.2.5 按照其时间或空间状态不同，可以分为时序数据与截面数据两类\n时序数据：时间序列数据简称。对同一现象在不同时间上收集到的数据,描述现象某一\n方面或几方面的数量特征随时间而变化的情况。空间状态相同，时间状态不同。\n截面数据：同类现象在相同或近似相同的时间上收集到的数据,描述其在相同时间状态\n下同类现象的数量特征在不同空间状态的差异情况。空间状态不同，时间状态相同。", "page": 2}, {"number": "1.2.4", "title": "统计数据研究方法（观、分、指、推、模）", "content": "1.2.4 统计数据研究方法（观、分、指、推、模）\n①大量观察法：对所研究现象总体中的足够多数的个体进行观察和研究。\n②统计分组法：根据事物内在的性质和统计研究任务的要求，将总体各单位按照某种\n属性或特征划分为若干个组成部分的一种研究方法。\n③综合指标法：运用各种统计指标来反映和研究社会经济现象总体的一般数量特征和\n数量关系的研究方法。常见的综合指标：总量指标、相对指标和平均指标。\n④统计推断法：根据一定的经济理论和假设条件，运用数学方程去模型现实经济现象\n相互关系的一种研究方法，包括三个基本要素：变量、数学方程和模型参数。\n⑤统计模型法：反映现象总体数量特征的同时，需要对相关现象之间的数量变动关系\n进行定量研究，以了解某一现象数量变动与另一现象数量变动之间的关系及变动的影响程\n度。", "page": 3}, {"number": "1.3", "title": "统计学的基本概念", "content": "1.3 统计学的基本概念", "page": 3}, {"number": "1.3.1", "title": "总体与样本", "content": "1.3.1 总体与样本", "page": 3}, {"number": "1.3.1", "title": ".1 总体", "content": "1.3.1.1 总体\n1.总体的含义与特征\n含义：总体，指统计所研究事物的全体。由客观存在的具有某种共同性质的个体组成的\n集合体。\n特征：\n①总体具有大量性、同质性、差异性。\n②大量性：总体中的个体数必须是充分多的。\n③同质性：总体中的每个个体都必须具有某种共同属性或特征。\n④差异性：个体的属性或特征在某些方面又必须存在一定的差异。\n⑤三者关系：大量性是条件，同质性是基础，差异性是前提。\n3.总体与个体的关系\n①总体容量随着个体数的增减可变大或变小。\n②随着研究目的不同，总体中的个体可发生变化。\n③随着研究范围的变化，总体与个体的角色可以变换。", "page": 3}, {"number": "1.3.1", "title": ".2 样本", "content": "1.3.1.2 样本\n1.样本的含义\n样本：从总体中抽取的一部分个体所组成的集合，称为子样。\n2.样本与总体的关系\n①总体是所要研究的对象，而样本则是所要观测的对象，样本是总体的代表和缩影。\n数量着眼于总体，但由于在很多情况下不能进行全面观测研究，只能从样本着手，期望通过\n对样本数量特征的认识来达到对总体特征认识的目的，即通过样本观测来研究总体。\n②样本是用来推断总体的。对样本进行观测的目的是要对总体数量特征做出估计或判\n断，即通常所说的以样本推断总体。\n③总体和样本的角色是可以改变的。", "page": 3}, {"number": "1.3.2", "title": "标志和变量", "content": "1.3.2 标志和变量", "page": 4}, {"number": "1.3.2", "title": ".1 标志", "content": "1.3.2.1 标志\n1.标志的含义\n含义：描述或体现个体特征的名称。", "page": 4}, {"number": "1.3.2", "title": ".2 变量", "content": "1.3.2.2 变量\n1.变量的含义\n①从狭义上看，变量指可变的数量标志。\n②从广义上看，变量不仅指可变的数量标志，也包括可变的品质标志。", "page": 4}, {"number": "1.3.3", "title": "统计指标与指标体系", "content": "1.3.3 统计指标与指标体系", "page": 4}, {"number": "1.3.3", "title": ".1 统计指标", "content": "1.3.3.1 统计指标\n1.统计指标的含义与构成要素\n统计指标：简称指标，反映现象总体数量特征的概念及其数值。\n2.统计指标与标志的关系\n区别：\n①两者说明的对象不同。指标说明总体特征；标志则说明个体特征。\n②两者的表现形式不同。指标用数值来表现的；标志既有只能用文字来表现的品质标\n志，又有用数值来表现的数量标志。\n联系：\n①标志是计算统计指标的依据，即统计指标数值是根据个体的标志表现综合而来的。\n②由于总体与个体在一定条件下可以相互转化，因此指标与标志的确定也是相对的、\n可以换位的。\n3.统计指标的分类\n数量指标按照其反映现象内容的不同，可以分为总体标志总量和总体容量：\n①总体标志总量：总体中所有个体的某个标志的标志值之和，即某变量的所有变量值\n之和。\n②数量指标按照其反映现象时间状况的不同，分为时期指标与时点指标（详见时间序\n列）。", "page": 4}, {"number": "1.3.3", "title": ".2 统计指标体系", "content": "1.3.3.2 统计指标体系\n1.统计指标体系的含义\n统计指标体系：由一系列统计指标构成。不是单个指标的简单组合，而是各个指标之间\n相互联系、相互制约。\n2.统计指标体系的表现形式\nⅠ.数学等式关系Ⅱ.相互补充关系Ⅲ.相关关系Ⅳ.原因、条件和结果关系\n3.统计指标体系的设计（2023）（目科可灵层联协）\n(1)目的性原则。围绕研究目的。\n(2)科学性原则。符合科学的原理。\n(3)可行性原则。确保每个指标都能准确计算出其数值。\n(4)灵活性原则。从客观实际需要出发。\n(5)层次性原则。体现所研究现象本质内涵的层次性。\n(6)联系性原则。使所包含的各个指标之间相互联系。\n(7)协调性原则。使各指标之间相互协调一致。", "page": 4}], "page": 1}, {"title": "第二章统计数据的收集、整理与显示", "sections": [{"number": "2.1", "title": "统计数据的收集", "content": "2.1 统计数据的收集", "page": 6}, {"number": "2.1.1", "title": "统计数据收集的含义和要求", "content": "2.1.1 统计数据收集的含义和要求\n统计数据收集：按照统计研究的目的和任务，运用各种科学有效的方式和方法，有针对\n地收集反映客观现实的统计数据的活动过程。\n统计数据收集：整个统计活动的基础阶段，称为统计调查阶段。", "page": 6}, {"number": "2.1.3", "title": "统计数据收集方式", "content": "2.1.3 统计数据收集方式", "page": 6}, {"number": "2.1.3", "title": ".1 统计调查方式", "content": "2.1.3.1 统计调查方式\n统计调查方式主要有：普查、抽样调查、重点调查、统计推算\n1.普查\n普查：根据特定的统计研究目的，专门组织的一次性的全面调查。用以收集所研究现象\n总体的全面资料。\n作用：为政府制定社会经济发展战略和方针政策提供依据。\n我国目前主要分类：人口普查和经济普查。\n原则：①规定统一的标准时间。\n②在普查范围内各调查点要统一行动。\n③统一规定调查项目。\n④要选择最合适的普查工作时间。\n⑤注意普查的周期化。\n2.抽样调查（2025）\n①分类：抽样调查可分为概率抽样和非概率抽样两类。\n概率抽样：按照随机原则从总体中抽取一部分单位作为样本并推断总体。即总体中每\n个个体都有已知的、非零的概率被抽取到样本中。\n非概率抽样：凭主观判断或根据便利性原则来抽取样本。总体中每个个体被抽取的可\n能性难以用概率表示计算。\n②概率抽样：\n特点：Ⅰ.在样本抽取上遵循随机原则。\nⅡ. 在调查功能上能以部分推断总体。\nⅢ.在推断手段上运用概率估计的方法。\nⅣ.在推断理论上，以大数定律和中心极限定理为依据。\nⅤ.在推断效果上，抽样误差可以计算，加以控制。\n【大数定律：随着样本容量的增加，样本平均数将趋于接近总体平均数。\n中心极限定理：样本容量足够大，样本统计量的分布趋于服从正态分布。（2023）】\n概率抽样分类：\n①抽样方法上，分为重复抽样和不重复抽样。\n（1）重复抽样：从容量为N 的总体中抽取一个容量为n 的样本。每次从总体中抽取\n一个个体后又放回总体参加下一次抽样，连续抽n 次，n 个观测值构成样本数据。\n（2）不重复抽样：从容量为N 的总体中抽取一个容量为n 的样本。每次从总体中抽\n取一个个体后不再将它放回总体参加下一次抽样，连续抽n 次，n 个观测值构成样本数据。\n②抽样组织形式上看，分为简单随机抽样、分层抽样、等距抽样、整群抽样、多阶段\n抽样五种。\n（1）简单随机抽样：纯随机抽样。未对总体中的个体进行事先分组或组合，直接从总\n体中完全随机地抽取样本的一种抽样组织形式。\n（2）分层抽样：类型抽样。将总体的N 个个体按某一标志分为若干层，然后每层分别\n抽取部分个体作为层内样本，构成总容量为n 的样本，最后以样本的观测结果去估计推断各\n层及总体数量特征的一种抽样组织形式。\n（3）等距抽样：系统抽样。将总体的N 个个体按某种标志排队并等分成n 段，每段k\n个个体，在第一段的k 个个体中随机抽取一个个体后，再每隔k 个个体抽取下一个个体，共\nn 个个体构成样本的一种抽样组织形式。\n（4）整群抽样：集团抽样。总体的所有个体形成若干群后，从中随机抽取部分群并对\n抽中群进行全面观测的一种抽样组织形式。\n（5）多阶段抽样：多级抽样。以整群抽样为基础，从总体的所有大群中抽取若干大群，\n抽中的大群中再抽取若干小群，抽中的小群中再抽取若干更小的群。如此下去，最后才抽取\n所要观测个体的一种抽样组织形式。\n抽样调查的作用：\n①认识那些不能或难以进行全面调查的总体数量特征。\n②认识那些发展变化比较稳定、有规律性、不必进行全面调查的现象总体的数量特征.\n③收集灵敏度高、时效性强或时间要求紧迫的统计数据。\n④与其他数据收集方式相结合，相互补充和核对。\n3.重点调查\n重点调查：非全面调查。对数据收集对象总体中部分重点个体进行观测的统计调查方式。", "page": 6}, {"number": "2.1.3", "title": ".4 数据收集误差", "content": "2.1.3.4 数据收集误差\n①两种误差：观测性误差、代表性误差。\n②观测性误差：登记性误差、调查性误差。在调查观测的各个环节因工作粗心，或被\n观测者不愿很好配合而造成的所收集数据与实际情况不符的误差。包括计量错误、记录错误、\n计算错误、抄写错误、汇总错误、计算机输入误差等工作误差。\n以及被调查者不愿或难以提供真实情况的误差，还存在调查人员弄虚作假的误差和各种\n人为因素干扰的误差。在全面调查和非全面调查中都会产生，并且一般调查范围越广越大，\n观测的个体越多，则产生误差的可能性越大，是一种非一致性误差。\n③代表性误差：在抽样调查中，样本不能完全代表总体而产生的估计结果与总体真实\n数量特征不符的误差。\n代表性误差分为系统性代表性误差和偶然性代表性误差。\nⅠ.系统性代表性误差：从总体中抽取调查单位时违反随机原则、被调查者无回答等\n因素引起的误差。难以计算和控制。\n【抽样调查中的观测性误差与系统性代表性误差合在一起，统称为非抽样误差。】\nⅡ.偶然性代表性误差：抽样误差/偶然性误差。抽样的随机性造成，在抽样调查中，\n即使严格按照随机原则抽取调查单位，也不可避免地造成误差。不可避免，可以计算、控制。", "page": 7}, {"number": "2.1.4", "title": "统计数据收集方法", "content": "2.1.4 统计数据收集方法\n常用的方法：直接观察法、通讯法、采访法、登记法和网络法等", "page": 8}, {"number": "2.1.5", "title": "问卷设计", "content": "2.1.5 问卷设计", "page": 8}, {"number": "2.1.5", "title": ".1 问卷的概念与结构", "content": "2.1.5.1 问卷的概念与结构\n2.问题设计的原则\n(1) 问题必须符合客观实际情况。\n(2) 问题不能太多。\n(3) 问题必须是被调查者有能力回答的。\n(4) 不要直接提社会上禁忌的和敏感性的问题。\n(5) 问题不能带有诱导性和倾向性，要保持客观中立。\n(6) 问题的内容要单一。\n(7) 问题的语言要简单易懂、标准规范。\n(8) 问题的排列要讲究逻辑性。\n2.问题答案的设计原则\n(1)\n穷尽原则：所列答案应包括所有可能的回答。\n(2)\n互拆原则：不同答案之间不能相互包含。\n(3)\n答案的表达必须简单易懂、标准规范。\n(4)\n每一项答案都应有明显的填答标记，答案与答案之间要留下足够的空格。", "page": 8}, {"number": "2.2", "title": "统计数据的整理", "content": "2.2 统计数据的整理", "page": 8}, {"number": "2.2", "title": ".1", "content": "2.2.1\n统计数据整理的含义与要求\n统计数据整理：统计整理。根据统计研究的目的，对统计收集到的数据进行科学的加工\n处理。使之系统化、条理化、综合化，成为能反映研究对象总体数量特征，满足统计分析需\n要的统计数据的过程。\n方面：①对原始统计数据的整理：\n通过分组汇总，使反映个体特征的数据，转化为反映总体特征的数据。\n②对次级数据再整理：\n通过新的分组、计算或各种必要的调整，使之满足新的需要。", "page": 8}, {"number": "2.2.2", "title": "统计数据整理的步骤", "content": "2.2.2 统计数据整理的步骤\n步骤：1.整理方案的设计2.数据预处理3.统计分组和汇总4.整理数据的显示5.整理数\n据的保存与公布", "page": 9}, {"number": "2.2.3", "title": "统计分组", "content": "2.2.3 统计分组", "page": 9}, {"number": "2.2.3", "title": ".1", "content": "2.2.3.1\n统计分组的含义与性质\n统计分组：根据统计研究的目的和事物本身的特点，选择一定的标志，将研究现象总体\n划分为若干性质不同的组或类的一种统计研究方法。\n性质：①计分组兼有分与合的双重功能。分与合的对立统一。\n②统计分组必须遵循“穷尽原则”和“互斥原则”。现象总体中的任何一个个\n体都必须且只能归属于某一个组，不能出现遗漏或重复出现的情况。\n③统计分组目的：在同质性的基础上研究总体的内在差异性，尽量体现出分组\n标志的组间差异而缩小其组内差异。\n④统计分组在体现分组标志的组间差异的同时，可能掩盖了其他标志的组间差\n异。任何统计分组的意义都有一定的限定性。\n⑤统计分组关键：分组标志的选择和分组界限的确定。分组标志选择不当、界\n限不合理，会混淆事物的性质，难以客观反映现象总体的特征。", "page": 9}, {"number": "2.2.4", "title": "分布数列", "content": "2.2.4 分布数列", "page": 9}, {"number": "2.2.4", "title": ".1 分布数列的概念与种类", "content": "2.2.4.1 分布数列的概念与种类\n频数：分配在各组的个体数\n频率：各组频数与总频数之比", "page": 9}, {"number": "2.2.4", "title": ".2 变量数列的编制", "content": "2.2.4.2 变量数列的编制\n1.单项式数列：\n含义：以一种变量值表示一个组的变量数列。\n适用条件：适合于表现变量值变动范围不大的离散型变量分布特征。\n2.组距式数列：\n含义：以一个变量区间表示一个组的变量数列。\n适用条件：适合于表现连续型变量和变量值变动范围较大的离散型变量分布特征。\n编制组距式数列需要处理的问题：\n(1)\n组距与组数。各组变量区间的最大值称为上限，最小值称为下限，上限与下限之差\n就是组距。所划分的区间数，则称为组数。\n(2)\n组限与组中值。\n组限：在组距式数列中，必须划定各组的数量界限。\n组中值：代表各组变量值一般水平的数值，是各组上限与下限的简单算术平均数。\n【注意：Ⅰ.最小组的下限应略低于总体的最小变量值，最大组的上限应略高于总体的\n最大变量值。\nⅡ.连续型变量的各组组限必须重叠，以防分组时出现遗漏某些个体的现象。采\n用“上限不在内”原则，即各组包含下限变量值的个体而不包含上限变量值的个体。\nⅢ.有时最小组只有上限而没有下限，最大组只有下限而没有上限，称为开口组。】", "page": 9}, {"number": "2.3.2", "title": ".3 曲线图", "content": "2.3.2.3 曲线图\n钟形分布与U 形分布：\n①钟形分布：“中间大，两头小”的分布。靠近中间变量值的分布频数大、频率高，靠\n近两端变量值的分布频数小、频率低，形如古钟。\n②正态分布：以变量的平均数为中心，左右两侧完全对称的分布。\n特点：1.变量平均数两侧的频数或频率随着与平均数距离的增大而完全相等地依次\n减少。\n2.变量平均数两侧的频数或频率分布不完全对称，则为偏态分布。分为左(负)\n偏分布和右(正)偏分布两种。\n【补充（2025）：\n正态分布的“3σ”原则：描述了数据在均值（μ）附近分布的规律。\n内容：①1σ范围：约68%的数据落在均值左右1 个标准差（μ ± σ）内。\n公式为：μ - σ ≤X ≤μ + σ\n②2σ范围：约95%的数据落在均值左右2 个标准差（μ ± 2σ）内。\n公式为：μ - 2σ ≤X ≤μ + 2σ\n③3σ范围：约99.7%的数据落在均值左右3 个标准差（μ ± 3σ）内。\n公式为：μ - 2σ ≤X ≤μ + 2σ\n应用：①质量控制：用于识别生产过程中的异常。\n②统计分析：帮助判断数据点是否属于正常范围。\n③风险管理：评估金融风险的极端情况。\n】", "page": 10}], "page": 6}, {"title": "第三章变量分布特征的描述", "sections": [{"number": "3.1", "title": "集中趋势的描述", "content": "3.1 集中趋势的描述\n三个方面描述：\n①变量分布的集中趋势：反映变量分布中各变量值向中心值靠拢或聚集的程度。\n②变量分布的离中趋势：反映变量分布中各变量值远离中心值的程度。\n③变量分布的形状：反映变量分布的偏斜程度和尖陡程度。", "page": 11}, {"number": "3.1.1", "title": "集中趋势与平均指标", "content": "3.1.1 集中趋势与平均指标\n定义：\n①集中趋势：趋中性。变量分布以某一数值为中心的倾向。用平均指标来反映。\n②平均指标：将变量的各变量值差异抽象化，以反映变量值一般水平的综合指标，即\n反映变量分布中心值或代表值的指标。主要：数值平均数、位置平均数。\n作用：\n(1) 通过反映变量分布的一般水平，帮助人们对研究现象的一般数量特征有一个客观\n的认识。\n(2) 利用平均指标可以对不同空间的发展水平进行比较，消除因总体规模不同而不能直\n接比较的因素，反映它们之间总体水平上存在的差距，分析产生差距的原因。\n(3) 反映同一现象总体在不同时间上的发展水平进行比较，说明现象发展变化的趋势或\n规律性。\n(4) 分析现象之间的依存关系或数量上的推算。\n(5) 作为研究和评价事物的一种数量标准或参考。", "page": 11}, {"number": "3.1.2", "title": "数值平均数", "content": "3.1.2 数值平均数", "page": 11}, {"number": "3.1.2", "title": ".1 算术平均数", "content": "3.1.2.1 算术平均数\n4.算术平均数的优缺点\n优点：\n①利用算术平均数推算总体标志总量。算术平均数与变量值个数之乘积等于总体标志\n总量。\n②在数理上具有无偏性与有效性的特点，在统计推断中得到了极为广泛的应用。\n③具有良好的代数运算功能。\n缺点：\n①易受特殊值(特大或特小值)的影响。变量存在少数几个甚至一个极值时，导致算术\n平均数迅速增大或变小，影响对变量值一般水平的代表性。\n②组距数列计算时，组中值具有假定性而使得计算结果是一个近似值，尤其存在开口\n组时，准确性会更差。", "page": 11}, {"number": "3.1.2", "title": ".2 调和平均数（计算题）", "content": "3.1.2.2 调和平均数（计算题）\n调和平均数：以各组标志总量除以变量值求出各组频数；再以各组标志总量之和除以频\n数之和。\n加权调和平均数与加权算术平均数两者可以相互变通的\n3.由相对数或平均数计算平均数（计算题）", "page": 11}, {"number": "3.1.2", "title": ".3 几何平均数（计算题）", "content": "3.1.2.3 几何平均数（计算题）\n几何平均数：计算平均比率或平均速度常用的一种方法。", "page": 12}, {"number": "3.1.2", "title": ".4 算术平均数、调和平均数和几何平均数的数学关系", "content": "3.1.2.4 算术平均数、调和平均数和几何平均数的数学关系\n都是幂平均数的一种。\n①当t=1 时，幂平均数是算术平均数。\n②当1=-1 时，幂平均数是调和平均数。\n③当t 趋向于零时，幂平均数极限形式是几何平均数。\n④三者的大小关系是\nx\nG\nH\n。", "page": 12}, {"number": "3.1.3", "title": "位置平均数", "content": "3.1.3 位置平均数", "page": 12}, {"number": "3.1.3", "title": ".1 中位数与分位数", "content": "3.1.3.1 中位数与分位数\n1.中位数\n中位数：变量的所有变量值按定序尺度排序，处于中间位置的变量值。\n适用条件：既可用以测定定量变量的集中趋势，也可用以测定定序变量的集中趋势。\n不适用于定类变量。\n特点：\n优点：\n①作为位置平均数，概念较为清晰，只要排列数据顺序，比较容易确定。\n②不受变量数列中特殊值的影响。遇有极值，中位数来表示现象的一般水平更具有代\n表性。\n③组距数列开口组，对中位数无影响。\n④某些变量不能表现为数值但可以定序时，不能计算数值平均数而可以确定中位数。\n缺点：\n①不可以进行代数运算。\n②除变量数列的中间部分数值外，其他数值的变化都不对中位数产生影响。灵敏度较\n低。\n2.分位数[复试]", "page": 12}, {"number": "3.1.3", "title": ".2 众数", "content": "3.1.3.2 众数\n定义：变量数列中出现次数最多、频率最高的变量值。\n适用条件：测定任何种类变量的集中趋势。包括定类变量和定序变量。\n特点：\n①不受特殊值的影响，表示某些现象的一般水平有较好的代表性。\n②应用面较广，用于测定任何变量的集中趋势。\n③在总频数充分多且某一组的频数明显高于其他组时才有意义。各组的频数相差不多，\n则不能确定众数。\n④有时一个变量数列会有两个组的频数明显最多，就会有两个众数，该数列属于双众\n数数列。\n⑤不能代数运算。", "page": 12}, {"number": "3.1.3", "title": ".3 中位数、众数和算术平均数的关系", "content": "3.1.3.3 中位数、众数和算术平均数的关系\n三者关系：\n①在不同条件下，均可代表变量的平均水平，可用以反映变量分布的集中趋势。\n②在变量分布服从正态分布时，中位数、众数和算术平均数三者完全相等，即 mₑ = mₒ = x̄。\n③在变量分布服从偏态分布时，三者之间存在着差异。算术平均数受极大值一端的影\n响较大，变量分布向右偏。三者之间的关系：x̄ > mₑ > mₒ。\n④在轻微偏态时，不论左偏还是右偏，众数与算术平均数的距离约等于中位数与算术平\n均数的3倍，即 x̄ − mₒ ≈ 3(x̄ − mₑ)。", "page": 13}, {"number": "3.2", "title": "离中趋势的描述", "content": "3.2 离中趋势的描述", "page": 13}, {"number": "3.2.1", "title": "离中趋势和离散指标", "content": "3.2.1 离中趋势和离散指标\n含义：\n①离中趋势：变量分布中各变量值背离中心值的倾向。用离散指标反映。\n②离散指标：反映变量分布中各变量值远离中心值或代表值程度的指标，\n主要：全距、四分位差、异众比率、平均差、标准差、离散系数等。\n离散系数的作用：\n(1) 衡量和比较平均数的代表性。\n(2) 反映各种现象活动过程的均衡性、节奏性、稳定性。\n(3)为统计推断提供依据。", "page": 13}, {"number": "3.2.2", "title": "离散指标的测度", "content": "3.2.2 离散指标的测度", "page": 13}, {"number": "3.2.2", "title": ".1 全距", "content": "3.2.2.1 全距\n定义：变量的最大值与最小值之差，也叫极差。", "page": 13}, {"number": "3.2.2", "title": ".2 四分位差", "content": "3.2.2.2 四分位差\n定义：四分位数中第一个四分位数与第三个四分位数之差。\n作用：\n值越小(越大),变量中间数值的分布越集中(越离散),中位数的代表性越好(越差)。", "page": 13}, {"number": "3.2.2", "title": ".3 异众比率", "content": "3.2.2.3 异众比率\n定义：分布数列中非众数组的频数与总频数之比。\n作用：\n越大(越小),数列的分布越分散(越集中),众数的代表性就越差(越好)。", "page": 14}, {"number": "3.2.2", "title": ".4 平均差", "content": "3.2.2.4 平均差\n含义：变量分布中各单位标志值与其算术平均数之间离差绝对值的平均数。\n公式：A.D. = Σ|x − x̄| / n\n缺点：\n对每一个离差都取了绝对值，数学处理不方便，数学性质不是最优，应用上受到了限制。", "page": 14}, {"number": "3.2.2", "title": ".5 方差和标准差", "content": "3.2.2.5 方差和标准差\n含义：变量的各变量值与其均值的离差平方的算术平均数。标准差：方差的平方根。\n方差公式：σ² = Σ(x − μ)² / N（总体）; s² = Σ(x − x̄)² / (n−1)（样本）\n标准差公式：σ = √[Σ(x − μ)² / N]; s = √[Σ(x − x̄)² / (n−1)]\n性质：\n①常数方差为0。\n②若 y = a + bx，a,b为常数，则y与x各自方差关系：S²_y = b²·S²_x\n③标准差s 是计算标准化值的依据。\n特点：\n准差与平均差相比，不仅具有平均差的优点，而且弥补了平均差的不足。加上标准差的\n计量单位与变量相同，意义比方差明确，标准差在实践中得到了广泛的应用。", "page": 14}], "page": 11}, {"title": "第四章抽样估计", "sections": [{"number": "4.1", "title": "抽样分布", "content": "4.1 抽样分布", "page": 15}, {"number": "4.1.1", "title": "抽样分布的基本问题", "content": "4.1.1 抽样分布的基本问题", "page": 15}, {"number": "4.1.1", "title": ".1 总体分布及其特征", "content": "4.1.1.1 总体分布及其特征\n含义：总体分布：总体中所有个体关于某个变量标志取值形成的分布。\n总体参数：反映总体分布特征的指标。用θ来表示。", "page": 15}, {"number": "4.1.1", "title": ".2 样本分布及其特征", "content": "4.1.1.2 样本分布及其特征\n含义：样本分布：样本中所有个体关于某个变量(标志)取值形成的分布。\n样本统计量：反映样本分布特征的指标。通常用T 来表示。", "page": 15}, {"number": "4.1.1", "title": ".3 抽样分布及其特征", "content": "4.1.1.3 抽样分布及其特征\n1.抽样分布的概念及影响因素\n含义：抽样分布：样本统计量的概率分布，由样本统计量所有可能取值和与之对应的概\n率组成。从容量为N 的总体中抽取容量为n 的样本时，所有可能的样本统计值所形成的分\n布。\n抽样分布形成的因素：\n①总体分布。其他因素不变时，总体分布不同则抽样分布也不一样。一般总体分布越\n集中抽样分布也越集中，总体分布越分散抽样分布也越分散。\n②样本容量。决定抽样分布最有效、最关键的因素。其他因素不变时，样本容量越大\n则抽样分布越集中，样本容量越小则抽样分布越分散。\n③抽样方法。重复抽样与不重复抽样的抽样分布不同，考虑样本单位抽取顺序与不考\n虑有别。\n④抽样组织形式。对同一总体、相同的样本容量和抽样方法，不同的抽样组织形式就\n有不同的样本结构和样本个数，因而有不同的抽样分布。\n⑤估计量构造。以样本估计总体必须借助一定的估计量，通常用σ表示。其他因素不\n变时，估计量构造不同，估计值就不一样，抽样分布也就不同。\n估计量的构造是否利用调查变量本身以外的信息上，分为直接估计量与间接估计量。\n直接估计量：利用样本提供的关于调查变量本身的信息。此时估计量就是样本统计量T。\n间接估计量：利用样本提供的关于调查变量本身的信息外，还利用与调查变量相关的辅\n助变量的信息。估计量就是样本统计量T 的改造形式，样本统计量分布就变成了估计\n量分布。\n3.抽样分布特征\n①抽样分布的特征主要是通过抽样分布的方差来体现。在各种抽样方法和抽样组织形\n式下，样本统计量的数学期望等于总体参数。这个性质基本都能得到满足。\n②抽样分布越集中、样本统计量分布的方差越小，所抽取样本的统计值就越可能接近\n总体参数。抽样估计的误差就越小，抽样估计的结果就越精确。", "page": 15}, {"number": "4.1.2", "title": "常用的抽样分布定理", "content": "4.1.2 常用的抽样分布定理", "page": 16}, {"number": "4.2", "title": "抽样误差", "content": "4.2 抽样误差", "page": 16}, {"number": "4.2", "title": ".1", "content": "4.2.1\n抽样中的误差构成\n(总误差)² = (抽样误差)² + (非抽样误差)²", "page": 16}, {"number": "4.2.2", "title": "抽样误差的表现形式", "content": "4.2.2 抽样误差的表现形式\n抽样误差的表现形式：抽样实际误差、抽样标准误、抽样极限误差。", "page": 16}, {"number": "4.2.2", "title": ".1 抽样实际误差", "content": "4.2.2.1 抽样实际误差\n抽样实际误差：样本估计值与总体参数值之间的离差，表示为\nˆ\n。\n从估计精度来看，不关心正负，关心误差绝对值大小。", "page": 16}, {"number": "4.2.2", "title": ".2 抽样标准误", "content": "4.2.2.2 抽样标准误\n抽样标准误：衡量抽样误差大小的核心指标，对总体参数做出区间估计的一个重要因素。\n狭义上，所指的抽样误差就是抽样标准误。\n抽样标准误：抽样分布方差的平方根，即抽样分布的标准差或样本统计量的标准差。表示为 SE(θ̂) = √[V(θ̂)]。\n抽样标准误与实际抽样误差的关系【抽样标准误作用】：各个估计值的实际误差越大，\n则抽样标准误也越大；各个估计值的实际误差越小，则抽样标准误也越小。", "page": 16}, {"number": "4.2.2", "title": ".3 抽样极限误差", "content": "4.2.2.3 抽样极限误差\n1.抽样极限误差：估计量与总体参数之间所允许的最大误差范围。一次抽样估计时，估\n计量所允许的与总体参数值之间的最大绝对离差。用Δ来表示，即 |θ̂ − θ| ≤ Δ。\n2.确定因素：\n①抽样标准误：抽样分布本身具有多大标准差。其他条件既定时，抽样标准误越大(小),\n抽样极限误差也就越大(小)。\n②抽样估计概率保证程度【置信区间】：以样本估计总体，除精度要求外，还有可靠\n度要求，即以多大的概率来保证估计是准确的。\n【注：检验中α值和P 值的定义：\n①α值：α值是一个预先设定的显著性水平，通常用0.05（5%）作为标准值。代表了\n在假设检验中，愿意接受的犯第一类错误（错误地拒绝正确的零假设）的概率。\n②P 值：P 值是观察到当前或更极端结果的概率，假设零假设是真的。代表了在零假\n设成立的情况下，检验统计量取得当前值或更极端值的概率。用于评估观察到的数据与零\n假设的一致性。如果P 值小于或等于α值，拒绝零假设，认为结果是统计显著的。】\n3.提高抽样精度：在一定的概率保证下，通过抽样设计降低抽样标准误。\n[当分别为1、1.64、1.96、2、2.58 和3 时，1-α分别为68.27%、90%、95%、95.45%、\n99%和99.73%]", "page": 16}, {"number": "4.3", "title": "参数估计方法（2022）", "content": "4.3 参数估计方法（2022）", "page": 17}, {"number": "4.3", "title": ".1", "content": "4.3.1\n估计量的评价标准", "page": 17}, {"number": "4.3.1", "title": ".1 无偏性", "content": "4.3.1.1 无偏性\n含义：样本估计总体，某一估计值可能存在估计误差，但不存在系统性偏差。即所有可\n能的估计值与总体参数值离差的均值应该为零。", "page": 17}, {"number": "4.3.1", "title": ".2 一致性", "content": "4.3.1.2 一致性\n含义：样本估计总体，虽存在估计误差，但是优良的估计量。估计误差会随着样本容量\n的增大而减小。即随着样本容量的增大，估计量的值越来越靠近总体参数的真值。", "page": 17}, {"number": "4.3.1", "title": ".3 有效性", "content": "4.3.1.3 有效性\n含义：以样本估计总体，要求优良估计量的抽样标准误小于其他估计量的抽样标准误。\n即从平均的角度来看，优良估计量的估计误差应小于其他估计量的估计误差。", "page": 17}, {"number": "4.3.1", "title": ".4 充分性", "content": "4.3.1.4 充分性\n含义：以样本估计总体，根据样本观测数据计算估计值，往往要损失一些有用的信息。\n估计量的构造应尽量减少这种信息损失。", "page": 17}, {"number": "4.3.2", "title": "参数估计方法", "content": "4.3.2 参数估计方法", "page": 17}, {"number": "4.3.2", "title": ".1 点估计", "content": "4.3.2.1 点估计\n含义：点估计：以样本观测数据为依据。用某个统计量作为未知参数的估计量，用估计\n量的观察作为位置参数的估计值。\n优点：能给出一个明确的值。\n缺点：没有指出估计的允许波动范围和把握程度有多大。", "page": 17}, {"number": "4.3.2", "title": ".2 区间估计", "content": "4.3.2.2 区间估计\n含义：区间估计：用一个具有一定可靠程度的区间范围来估计总体参数。即对于未知的\n总体参数θ，找出两个数值 θ̂₁ 和 θ̂₂，使θ处于区间 (θ̂₁, θ̂₂) 内的概率为 1−α。即：\nP(θ̂₁ < θ < θ̂₂) = 1 − α\n特点：不指出被估计参数的确定数值，在一定的概率保证下指出被估计参数的可能范围。\n两个方面：\n①希望估计区间 (θ̂₁, θ̂₂) 包含θ的概率 (1−α) 越大越好。\n②希望估计区间 (θ̂₁, θ̂₂) 的长度越短越好。", "page": 17}], "page": 15}, {"title": "第五章假设检验", "sections": [{"number": "5.1", "title": "假设检验的基本问题", "content": "5.1 假设检验的基本问题", "page": 18}, {"number": "5.1.1", "title": "假设检验的概念与种类", "content": "5.1.1 假设检验的概念与种类\n假设检验：事先对总体参数或分布形态做出一个假设，利用样本提供的信息，以一定的\n概率来检验假设是否成立，判断总体的真实情况是否与原假设存在显著差异。\n常见统计假设：总体均值等于某一数值、总体相关系数等于零、两总体均值相等、总体\n分布服从正态分布。\n分类：根据检验目的不同，假设检验分为双侧检验和单侧检验。\n①双侧检验：\n双侧检验：同时注意总体参数估计值与其假设值相比的偏高和偏低倾向的检验。\n目的：判断总体参数值是否与某一假设值有显著差异，不管差异是正还是负。\n②单侧检验：\n单侧检验：只注意总体参数估计值比其假设值偏高或偏低倾向的检验。\n目的：判断总体参数值是否大于或小于某一假设的值。", "page": 18}, {"number": "5.1.2", "title": "原假设和备择假设", "content": "5.1.2 原假设和备择假设\n1.原假设：对总体参数值事先提出的假设。被检验的假设。\n备择假设：通过检验希望能够成立的假设。当原假设不成立时供选择的假设。\n2.两者关系：二者互相排斥的，有且只有一个正确。希望原假设 H₀ 能被推翻而备择假设 H₁ 能被接收，没有足够充分依据证明原假设是错误的，就不能轻易推翻。\n3.实质：样本信息是否有充分的理由否定原假设。\n4.注意：不是根据样本的结果去判断哪一个更有可能正确，两个假设不能同等看待。\n5.接受原假设 H₀ 的含义：只是认为否定的根据还不充分，不是认为它必然正确。", "page": 18}, {"number": "5.1.3", "title": "显著性水平和拒绝域", "content": "5.1.3 显著性水平和拒绝域\n小概率事件认定：\n①假设检验之前事先主观选定的。用α表示。\n②α取值视具体情况而定。通常取0.05 或0.01,有时也取0.10,把概率小于α取值的事件\n称为小概率事件。\n③α越大，样本统计值与总体参数假设值之间的差异成为显著性差异的可能性越大。\n④α越小，差异成为显著性差异的可能性越小。\n⑤显著性水平：α的大小是判定这种差异是否显著的一个标准。\n1-a：样本统计值与总体参数假设值之差不超过一定范围的概率。\n临界值规则：\n①临界值规则：把α值转化为一定分布下的临界值，计算检验统计值，把检验统计值与\n临界值相比较判断是否拒绝原假设。\n②检验统计量的绝对值小于临界值的绝对值，接受原假设。\n③检验统计量的绝对值大于或等于临界值的绝对值，拒绝原假设。\nP-值规则：\n①P-值规则：计算检验统计值Z,求出统计量分布曲线图中与检验统计值相对应观测到\n的显著性水平P 值。与事先给定的显著性水平α值相比判断是否拒绝原假设。\n②在双侧检验时，P 值为检验统计值为大于Z 值或小于Z 值的概率。\n若 P ≥ α（或 P > α）：一次抽样抽样的样本观测值出现极端值的情况在规定的显著性水平下不太可能发生，接受原假设 H₀。\n若 P < α（或 P ≤ α）：一次抽样的样本观测值出现极端值的情况在规定的显著性水平下发生了，拒绝原假设 H₀。\n③在单侧检验时，若 P ≥ α，接受原假设 H₀；若 P < α，则拒绝原假设 H₀。", "page": 18}, {"number": "5.1.4", "title": "假设检验的基本步骤", "content": "5.1.4 假设检验的基本步骤\n(1) 提出原假设 H₀ 和备择假设 H₁。\n(2) 确定检验的显著性水平。\n(3) 根据样本统计量的概率分布确定与α相对应的临界值，确定接受域和拒绝域。\n(4) 构造检验统计量，根据样本观测数据计算出检验统计值。\n(5)比较检验统计值与临界值，做出接受或拒绝原假设的判断。", "page": 19}, {"number": "5.3", "title": "假设检验的两类错误与功效", "content": "5.3 假设检验的两类错误与功效", "page": 19}, {"number": "5.3.1", "title": "假设检验的两类错误", "content": "5.3.1 假设检验的两类错误\n①第一类错误是“弃真”错误：α错误，原假设正确但却被拒绝的错误。\n犯错概率：由假设检验的显著性水平给出。\n来源：小概率事件在一次试验中基本上不会发生，事实上即使很小概率的事件也可能在\n一次试验中发生，大小由α决定。原假设正确时，检验统计值落入拒绝域的概率就是α。\n②第二类错误是“纳伪”错误：β错误，原假设不正确却被接受的错误。\n犯错概率：当备择假设成立时，检验统计值落入接受域的概率。\n来源：由于在假设检验中，必须做出接受 H₀ 或拒绝 H₁ 的抉择，难免要犯α错误或β错\n误。\n③原则：控制犯第一类错误的概率α的条件下，使犯第二类错误的概率β尽量小。\n④功效（Power）：Power = 1 − β，称为假设检验的功效。功效接近1越好，接近0越差。", "page": 19}], "page": 18}, {"title": "第六章方差分析", "sections": [{"number": "6.1", "title": "方差分析的一般问题", "content": "6.1 方差分析的一般问题", "page": 20}, {"number": "6.1", "title": ".1", "content": "6.1.1\n方差分析的含义\n自变量因变量的定义：\n①自变量：调查试验中需考察的、可控制的条件或影响因素。称为因素或因子。\n②因变量：待分析的指标。\n③基本思想：从不同角度计算有关的均值与方差，通过组内组间方差的对比，在统计理\n论指导之下分析条件误差与随机误差，分解判断出调查或实验观察数据中必然因素和偶然因\n素的影响大小。", "page": 20}, {"number": "6.1", "title": ".2", "content": "6.1.2\n方差分析的类型（2018）\n①按影响分析指标的因素个数：单因素方差分析、双因素方差分析（无交互、有交互）、\n多因素方差分析\n②按分析指标的变量多少：一元方差分析、多元方差分析\n③按理论：协方差分析、非参数方差分析", "page": 20}, {"number": "6.1.3", "title": "方差分析的基本思想", "content": "6.1.3 方差分析的基本思想", "page": 20}, {"number": "6.2", "title": "单因素方差分析", "content": "6.2 单因素方差分析", "page": 20}, {"number": "6.2", "title": ".1", "content": "6.2.1\n单因素方差分析的统计模型", "page": 20}, {"number": "6.3", "title": "双因素方差分析（2022 计算）", "content": "6.3 双因素方差分析（2022 计算）", "page": 20}, {"number": "6.3.2", "title": "无交互作用的双因素方差分析", "content": "6.3.2 无交互作用的双因素方差分析", "page": 20}, {"number": "6.3.3", "title": "有交互作用的双因素方差分析", "content": "6.3.3 有交互作用的双因素方差分析", "page": 21}], "page": 20}, {"title": "第七章相关回归分析", "sections": [{"number": "7.1", "title": "相关分析的基本问题", "content": "7.1 相关分析的基本问题", "page": 22}, {"number": "7.1.1", "title": "相关关系与函数关系", "content": "7.1.1 相关关系与函数关系", "page": 22}, {"number": "7.1.1", "title": ".1 函数关系", "content": "7.1.1.1 函数关系\n定义：现象之间存在确定性的数量依存关系。\n当某一变量或某些变量取任意一个值时，另一变量都会有一个确定值与之严格相对应，\n对应关系可以用一个数学表达式来反映。", "page": 22}, {"number": "7.1.1", "title": ".2 相关关系", "content": "7.1.1.2 相关关系\n定义：现象之间存在的非确定性的数量依存关系。即现象之间虽然存在着数量依存关系，\n一个现象发生数量上变化时，另一个现象数量水平也会相应地发生变化，但变化关系不是严\n格对应的。\n当一个变量数值确定时，另一个变量可能存在许多个可能的取值与之相对应，这些数值\n围绕其平均数上下波动。\n相关关系和函数关系之间的关系：\n①具有函数关系的现象，在实际中因观察或测量误差等原因，往往呈现出相关关系的\n特征；\n②相关关系通常利用相应的函数关系式来表现。", "page": 22}, {"number": "7.1.2", "title": "相关关系的种类", "content": "7.1.2 相关关系的种类\n①按照相关关系涉及的因素多少：单相关、复相关。\n单相关：两个因素之间的相关关系。\n复相关：三个或三个以上因素之间的相关关系。\n②对于单相关，按照现象数量变化的方向不同：正相关、负相关。\n正相关：自变量x 数值增加时，因变量y 的数值也随之相应增加；\n负相关：自变量x 数值增加时，因变量y 的数值随之减少。\n③按照相关关系的表现形式不同：线性相关、非线性相关，即直线相关、曲线相关。\n线性相关：变量之间呈线性关系；\n直线相关：两个相关现象数据在坐标上描点后，近似一条直线；\n非线性相关：变量之间呈非线性关系，形式多种多样；\n曲线相关：两个相关现象数据在坐标上描点后，近似一条曲线。\n④按照相关程度不同：完全相关、不完全相关和无相关。\n完全相关：一个现象的数量变化完全由另一个现象的数量变化所决定；\n无相关：两个现象的数量变化各自独立，互不影响；\n不完全相关：现象之间关系介于完全相关与无相关之间。", "page": 22}, {"number": "7.1.3", "title": "相关分析的主要内容", "content": "7.1.3 相关分析的主要内容\n(1)判断确定现象之间有无关系以及相关关系的具体表现形式。通过理论定性或利用图\n表观察的方法，判断现象之间是否有关系。有关系，进行相关分析才有意义。其次，判断现\n象之间相关关系的形态，以便在之后的分析中选择相应方法。\n(2)确定相关关系的密切程度。根据变量数据类型，选择适当方法，计算相关系数，确\n定现象之间相关关系的密切程度，为进一步的分析提供依据。\n(3)检验现象统计相关显著性。包括检验相关关系的存在性、强度是否达到一定水平、\n两对现象相关程度差异性，估计相关系数取值。\n(4)广义地说，相关关系分析包括对相关关系的数学形式加以描述，即拟合回归方程，\n检验回归方程合理性，应用回归模型进行统计分析、预测和控制。", "page": 23}, {"number": "7.2", "title": "相关关系的测度", "content": "7.2 相关关系的测度", "page": 23}, {"number": "7.2.2", "title": "相关系数的测定", "content": "7.2.2 相关系数的测定\n①对于定距/定比变量：皮尔逊线性相关系数。\n②对于定序变量：斯皮尔曼等级相关、肯特尔等级相关系数。\n③对于定类变量：列联系数。\n1.皮尔逊相关系数【积差法】\n计算公式：\nr = Σ[(x − x̄)(y − ȳ)] / √[Σ(x − x̄)² · Σ(y − ȳ)²]\n或 r = [nΣxy − ΣxΣy] / √[nΣx² − (Σx)²] · √[nΣy² − (Σy)²]\n皮尔逊直线相关系数r 的取值含义：\n(1)取值范围：-1≤r≤1。\n(2)正负号表示相关的方向，不表示相关程度的大小，即r>0 表示正相关，r<0 表示负相\n关。\n(3)相关程度大小要看相关系数绝对值。\n|r|越接近于1,表示相关密切程度越强；|r|越接近于0,表示相关密切程度越弱；当r=±1 时，\n就表示变量之间为完全相关；r=0 则表示完全不相关。\n(4)0.3 以下为无相关，0.3～0.5 为低度相关，0.5～0.8 为中度相关，0.8 以上是高度相关。\n(5)皮尔逊相关系数低，表示线性相关程度很低。不表示变量之间其他形式的相关密切\n程度很低。关系可能为非线性。", "page": 23}, {"number": "7.2.3", "title": "等级相关系数的测定方法", "content": "7.2.3 等级相关系数的测定方法", "page": 23}, {"number": "7.2.3", "title": ".1 斯皮尔曼相关系数", "content": "7.2.3.1 斯皮尔曼相关系数\n计算公式：rₛ = 1 − [6ΣD² / n(n² − 1)]\n其中 D 为每对观测值的等级差，n 为样本容量。", "page": 23}, {"number": "7.2.3", "title": ".2 肯德尔等级相关系数", "content": "7.2.3.2 肯德尔等级相关系数\n计算公式：τ = 2(n_c − n_d) / [n(n − 1)]\n其中 n_c 为一致对数，n_d 为不一致对数，n 为样本容量。", "page": 24}, {"number": "7.3", "title": "回归分析的基本问题", "content": "7.3 回归分析的基本问题", "page": 24}, {"number": "7.3", "title": ".1", "content": "7.3.1\n回归分析\n定义：具有相关关系的两个或两个以上变量之间数量变化的一般关系进行测定。\n确定因变量和自变量之间数量变动关系的数学表达式，以便对因变量进行估计或\n预测的统计分析方法。\n形式：\ny = β₀ + β₁x₁ + β₂x₂ + ... + βₚxₚ + ε\n其中 y 为因变量，x₁,...,xₚ 为自变量，β₀ 为截距，β₁,...,βₚ 为偏回归系数，ε 为随机误差项。", "page": 24}, {"number": "7.3.2", "title": "回归分析的主要内容", "content": "7.3.2 回归分析的主要内容\n(1)根据研究目的和现象之间内在联系，确定自变量和因变量。现象之间除了相关关系，\n还存在因果关系。做回归分析时，应首先从理论出发进行定性分析，根据现象的内在联系确\n定变量之间的因果关系，从而确定自变量和因变量。\n(2)确定回归分析模型的类型及数学表达式。根据内在影响机制或通过对数据描点分析，\n找出最适合的回归分析模型，再通过计算求出模型的待估参数，得到回归方程。估计方法：\n最小二乘法回归、岭回归、偏最小平方法回归、约束最小二乘法回归、主成分回归等。\n(3)对回归分析模型进行评价与诊断。得到具体的回归方程以后，要进行统计检验。如\n算一些检验统计量：t 值、F 值、估计标准误、判决系数、时间数列DW 检验等，对回归方\n程的代表性及拟合程度进行评价。检验判断基本假设是否合理、满足，并做相应改进。\n(4)根据给定的自变量数值确定因变量的数值。用于统计估计或预测，即根据给定的自\n变量数值估计因变量的数值或置信区间，及利用回归模型进行回归控制。\n【补充：\n1.因果关系（2018）：\n含义：先因后果是因果联系的特点之一。原因和结果必须同时具有必然联系，即二者的\n关系属于引起和被引起的关系。\n检验：理论分析法、格兰杰因果关系检验和sims 检验\n2.线性回归（2020）：\n1.基本假设：\n①因变量y 和自变量x 之间具有线性关系\n②误差项ε是期望值为零的随机变量。\n③对于所有的x 值，ε的方差同\nσ都相同。\n④误差项ε是服从正态分布的独立随机变量。即 ε ~ N(0, σ²)。对于特定x值，所对\n应的ε值与其他x 所对应的ε值不相关，所对应的y 值与其他x 所对应的y 值也不相关。\n2.不成立的应对方法：\n①通过方差膨胀因子VIF 判别所构建的模型是否存在多重共线性。VIF 是用于表示解释变量与模型中其他解释变量辅助回归模型的判定系数：\nVIFᵢ = 1 / (1 − R²ᵢ)\n其中 R²ᵢ 为第 i 个自变量与其他自变量辅助回归的判定系数。\n②通过BP 控验、怀特检验判别模型是否受到异方差因素的干扰影响。对发生了异方差\n影响干扰后的回归模型需进行修正。\n③通过DW 检验和拉格朗日检验,判别模型是否受到时间序列的影响。如有受影响,消阵\n参数变化\n④对以上处理后结果进行统计控验,查看假设是否成立。】", "page": 24}, {"number": "7.3.3", "title": "相关分析与回归分析的联系和区别", "content": "7.3.3 相关分析与回归分析的联系和区别\n联系：\n①两种分析的理论和方法一致。\n②没有相关分析就没回归分析。相关程度越高，回归效果越好。\n③相关系数与回归系数同号，可互算。\n区别：\n①相关分析：不必区分自量和因变量，变量之间是平行关系。\n回归分析：依据研究目的确定自变量和因变量，变量不对等，变量之间是因果关系。\n②相关分析：两个变量都是随机变量。\n回归分析：因变量是随机变量，自变量是非随机变量\n③相关分析：只能确定变量之间关系的方向和程度。\n回归分析：可以得到变量之间关系的方向、强弱程度、具体数量变动关系。\n④相关分析：两个变量只能算一个相关系数。\n回归分析：两个变量一般建立一个回归方程，互为因果，则可以建两个。\n⑤回归分析在相关分析的基础之上，进一步研究现象之间的数量变化规律，根据回归\n方程的参数得出参数之间的具体数量关系，也可用于估计推断。\n⑥回归系数具有实际意义，利用回归模型进行预测和控制。", "page": 25}, {"number": "7.4", "title": "回归分析的模型", "content": "7.4 回归分析的模型", "page": 25}, {"number": "7.4", "title": ".1", "content": "7.4.1\n简单线性回归分析", "page": 25}, {"number": "7.4.1", "title": ".1 简单线性回归模型", "content": "7.4.1.1 简单线性回归模型", "page": 25}, {"number": "7.4.1", "title": ".3 回归估计标准误【简答题】", "content": "7.4.1.3 回归估计标准误【简答题】\n回归估计标准误 S_yx：又称估计标准误差，对剩余方差开方得到，衡量回归估计精确度高低或回归方程代表性大小的统计分析指标。\nS_yx = √[Σ(y − ŷ)² / (n − 2)] = √[SSE / (n − 2)]\nS_yx\n越大，观测点的离散程度越大，回归直线方程的代表性越差，估计结果就越不精确。", "page": 25}, {"number": "7.4.1", "title": ".4 回归方程判定系数【简答题】", "content": "7.4.1.4 回归方程判定系数【简答题】\n①总变差=剩余变差+回归变差，即 SST = SSR + SSE\n其中：SST = Σ(y − ȳ)²（总离差平方和）\nSSR = Σ(ŷ − ȳ)²（回归平方和）\nSSE = Σ(y − ŷ)²（残差平方和）\n回归变差在总变差中所占的比重 SSR/SST 越大，则剩余变差在总变差中所占比重 SSE/SST 越小，\n观测点距离回归直线就越近，回归方程由自变量x 估计因变量y 的误差就越小，x 与y 之间\n的相关程度就越大。\n②r²: 判定系数，相关系数r的平方。表明自变量x的方差对因变量y的方差的解释程度，用来反映回归方程的拟合程度。\nr² = SSR / SST = 1 − SSE / SST\n= Σ(ŷ − ȳ)² / Σ(y − ȳ)² = 1 − Σ(y − ŷ)² / Σ(y − ȳ)²\nr 值越大，说明相关程度越密切，\nyx\nS\n值越小，也就是观测点离回归直线越近。\nr值大到 r = ±1 时，S_yx = 0，所有的观测点都在回归直线上，完全相关。", "page": 26}, {"number": "7.4.1", "title": ".5 回归方程的统计检验【简答题】", "content": "7.4.1.5 回归方程的统计检验【简答题】\n模型整体拟合效果的显著性检验：\n回归方程拟合效果越好，表明方程解释部分所占比重越大，SSR 与SSE 相比的值也越\n大，F 统计量也越大。\n模型参数显著性的检验：\nt 检验:一种用于比较两个样本均值差异的统计检验方法，基于t 分布。适用于样本\n量较小、数据近似正态分布的情况。\n单样本t 检验：比较单个样本的均值与已知的总体均值之间是否存在显著差异\n独立样本t 检验：比较两个独立样本的均值是否存在显著差异。\n配对样本t 检验：比较同一组对象在不同条件下的均值差异。\nF 检验：检验两个或多个样本的方差是否相等，或者用于回归分析中检验模型的解\n释能力。基于F 分布，适用于样本量较大的情况，通常用于方差分析。\n方差齐性检验：检验两个或多个样本的方差是否相等。\n单因素ANOVA、双因素ANOVA 等：用于检验三个或更多个样本的均值是否存在显著\n差异。\n③若 |t| > t_{α/2}(n−2)，拒绝原假设 H₀，认为回归系数对方程的影响是显著的；\n否则，说明该参数显著为零，该自变量对模型的影响不重要，应该考虑更换或变换该变\n量。", "page": 26}], "page": 22}, {"title": "第八章时间数列分析", "sections": [{"number": "8.1", "title": "时间数列的基本问题", "content": "8.1 时间数列的基本问题", "page": 27}, {"number": "8.1.1", "title": "时间数列的含义及其类型", "content": "8.1.1 时间数列的含义及其类型\n1.时间数列的定义\n时间数列：时间序列，某一指标数值按时间先后顺序加以排列而形成的统计序列。\n动态数列：动态上反映社会经济现象的数量发展变化。\n2.构成要素\n①现象所属的时间。\n②现象在相应时间所达到的水平。\n3.时间数列分析的意义\n(1)了解社会经济现象总体的动态变化全过程，便于人们客观全面地认识事物的发展方\n向和速度。\n(2)研究哪些因素对时间数列的指标数值起作用，进一步掌握事物发展变化的趋势和规\n律性。\n(3)根据时间数列原有的发展变化规律，进行短期或长期预测。", "page": 27}, {"number": "8.1.2", "title": "时间数列的种类", "content": "8.1.2 时间数列的种类", "page": 27}, {"number": "8.1.2", "title": ".1 总量指标时间数列（常考）", "content": "8.1.2.1 总量指标时间数列（常考）\n1.时期数列\n定义：同类的时期指标按时间先后顺序形成的数列。数列中的各期指标值反映社会经济\n现象在一定时期内累计达到的总量。\n特点：\n(1)数列中不同时间的指标数值可以累计。\n(2)指标值的大小和时期长短有直接关系，一般来说，时期越长，数值越大。\n(3)指标值一般是通过连续登记获取的。\n2.时点数列\n定义：时点指标按时间先后顺序排列而形成的统计数列。反映经济现象在某一时点或某\n一瞬间所达到的水平。\n特点：\n(1)数列中不同时点上数值不可以累计。\n(2)指标数值的大小和时间长短无直接关系。\n(3)时点指标的数值一般是通过不连续登记取得的。", "page": 27}, {"number": "8.1.3", "title": "时间数列的影响要素", "content": "8.1.3 时间数列的影响要素\n①长期趋势：时间序列中指标数值在较长一段时间内，由于受普遍、持续、决定性的\n基本因素作用，使发展水平沿着一个方向持续向上或向下或持续不变的态势。\n②季节变动：序列中各期指标值随着季节交替而出现周期性的、有规则的重复变动。\n通常指一年。\n③循环变动：序列中的各指标随时间变动发生周期性的重复变化，但所需的时间更长，\n重复变动的规律性、变动周期、时间不像季节变动稳定、可预料。\n④不规则变动：未能得到解释的一些短期波动所组成的。由于受偶然因素或意外条件\n影响，在一段时间内呈现不规则的或自然不可预测的变动。\n模型：\n①加法模型：当时间序列的四种变动因素相互独立时，时间序列就是各因素的代数和。\nY = T + S + C + I\n②乘法模型：当时间序列的四种变动因素相互影响时，时间序列就是各因素的乘积。\nY = T × S × C × I", "page": 27}, {"number": "8.1.4", "title": "时间数列的编制原则", "content": "8.1.4 时间数列的编制原则\n1.时间的一致性\n①时期数列：其指标数值大小与时期长短有直接关系，每个时期指标所含时间长短应\n该相等，以利于分析。\n②时点数列：每一数值所处时点应该统一。\n2.总体范围的一致性\n①总体范围包括空间范围与单位范围。基于区域的统计指标，应注意区域范围上的一\n致性，行政区划有过变动，要相应调整。\n②序列中各期指标值所包括的总体单位标准应该是相同的。\n3.经济内容的一致性\n①经济内容：一个理论形态统计指标的内涵及与之相适应的外延。指标名称完全相同\n的指标由于所处的年代、统计制度、理论依据的不同，含义与计算项目上会有很大的区别。\n②广义上，对于价值量指标，包括计算价格的可比性。\n4.计算方法的一致性\n①同一指标的不同计算方法有时是理论上的恒等关系或近似相等关系，有时却不是。\n理论上不具有，意味着是两个性质不同的指标计算内容的不同。\n②由于计算基点或数据来源或假设条件的差异，不同方法的计算结果常有所出入。", "page": 28}, {"number": "8.2", "title": "时间数列的水平分析", "content": "8.2 时间数列的水平分析\n时间数列的水平指标：发展水平、平均发展水平、增长量、平均增长量。", "page": 28}, {"number": "8.2.1", "title": "发展水平指标", "content": "8.2.1 发展水平指标\n定义：反映现象实际已经达到的规模和水平，时间序列的最基本指标。", "page": 28}, {"number": "8.2.2", "title": "平均发展水平指标", "content": "8.2.2 平均发展水平指标\n种类：“序时/动态平均数”。\n序时平均数和一般平均数联系和区别：\n①联系：都反映现象的一般水平或代表性水平，都是平均数。\n②区别：\n1.一般平均数:把同质总体某一数量标志在某一时间上的水平抽象化，静态上反映现象\n的一般水平或代表性水平；\n序时平均数:把同一现象在不同时间上的差异抽象化，动态上反映现象的一般水平或\n代表性水平。\n2.一般平均数:根据变量数列计算的\n序时平均数:根据时间数列来计算。", "page": 28}, {"number": "8.2.2", "title": ".1 时期数列序时平均数的计算", "content": "8.2.2.1 时期数列序时平均数的计算\n公式：ā = Σa / n（各期指标值之和除以时期项数）", "page": 29}, {"number": "8.2.2", "title": ".2 时点数列序时平均数的计算", "content": "8.2.2.2 时点数列序时平均数的计算\n四种情况：连续且等间隔、连续但不等间隔、不连续但等间隔、不连续且不等间隔。\n1.连续且等间隔\n计算含义：时点登记值的简单算术平均数。\n2.连续但不等间隔\n计算含义：以间隔天数为权数的加权算术平均数。\n3.不连续但等间隔\n“首尾折半法”：\nā = (a₁/2 + a₂ + a₃ + ... + a_{n−1} + a_n/2) / (n−1)\n4.不连续且不等间隔\n计算含义：间隔的时间长度作权数计算加权的序时平均数。\n间隔的时间长度作权数计算加权的序时平均数：\nā = [Σ(a_i + a_{i+1})f_i / 2] / Σf_i\n其中 a_i 为时点值，f_i 为相邻时点之间的间隔长度。", "page": 29}, {"number": "8.2.2", "title": ".3 相对数和平均数序时平均数的计算", "content": "8.2.2.3 相对数和平均数序时平均数的计算\n计算含义：一个相对指标或平均指标的分子指标记为a,分母指标记为b,该相对指标或平\n均指标记为c。\n序时平均基本公式：c̄ = ā / b̄（其中 ā 为分子指标序时平均数，b̄ 为分母指标序时平均数）", "page": 30}, {"number": "8.2.3", "title": "增长量指标", "content": "8.2.3 增长量指标\n1.增长量的含义\n增长量 = 报告期发展水平 − 基期发展水平\n2.增长量的种类\n逐期增长量 = 报告期发展水平 − 上一期发展水平\n累积增长量 = 报告期发展水平 − 某一固定时期发展水平\n3.基于增长量的相关指标\n(1)年距增长量指标。适宜于有季节性波动的现象增长量分析。\n年距增长量 = 报告期某月（季）发展水平 − 上年同月（季）发展水平\n(2)边际倾向指标。考察两项性质不同但有联系的经济指标其时间数列增量之间的关系\n时，可以计算边际倾向指标。", "page": 30}, {"number": "8.2.4", "title": "平均增长量指标", "content": "8.2.4 平均增长量指标", "page": 30}, {"number": "8.3", "title": "时间数列的速度分析", "content": "8.3 时间数列的速度分析", "page": 30}, {"number": "8.3.1", "title": "发展速度指标", "content": "8.3.1 发展速度指标\n公式：\n发展速度 = 报告期发展水平 / 基期发展水平\n环比发展速度 = 报告期发展水平 / 前一期发展水平\n定基发展速度 = 报告期发展水平 / 某一固定时期发展水平\n性质：\n①定期发展速度等于各期环比发展速度的连乘积。\n②相邻两个定基发展速度的商等于相应的环比发展速度。\n3.其他相关指标\n(1) 年距发展速度\n(5) 超过速度。同时考察两个关联的时间数列发展速度的对比关系时，可以计算，以判\n定哪一现象发展速度更快及其相对幅度。", "page": 30}, {"number": "8.3.2", "title": "增长速度指标", "content": "8.3.2 增长速度指标\n1.含义\n增长速度 = (报告期发展水平 − 基期发展水平) / 基期发展水平 = 发展速度 − 1（或100%）\n2.种类\n定基增长速度 = 定基发展速度 − 1 = (报告期水平 − 固定基期水平) / 固定基期水平\n环比增长速度 = 环比发展速度 − 1 = (报告期水平 − 上一期水平) / 上一期水平\n3.其他相关指标\n(1)年距增长速度:避免季节性波动的影响\n(2)弹性系数:反映一个现象相对变动对另一个现象变动的相对影响程度。\n(3)增长1%的水平值:增长速度进行分析时，应注意速度背后的绝对水平，基数不同，\n增长速度是不可比的，需把增长速度和增长量结合起来计算。计算公式为：\n增长1%的水平值 = 基期发展水平 / 100 = 增长量 / 增长速度（以%表示）", "page": 31}, {"number": "8.3.3", "title": "平均发展速度指标", "content": "8.3.3 平均发展速度指标\n2.计算方法\n(1)水平法：对于一个时间数列 a₀, a₁, a₂, ..., a_n，设其平均发展速度为 x̄，则意味着以 a₀ 为起点，此后各年发展水平的理论值分别为 a₀x̄, a₀x̄², a₀x̄³, ..., a₀x̄^n。\n从最后一年(终点)所达到的水平看，其实际值 a_n 应该等于按平均速度推算的理论值，即 a_n = a₀·x̄^n。\n平均发展速度为（2025计算）：\nx̄ = ⁿ√(a_n / a₀)\n(2)累计法（方程式法）。\n计算思路：设最初水平为 a₀，以后每期以 x̄ 的平均速度发展，则经过 n 期后达到的理论总水平应该等于其实际总水平。\n即 a₀x̄ + a₀x̄² + ... + a₀x̄^n = Σa_i（i=1到n）\n(3)水平法与累计法的比较：\n①水平法:侧重考察最末一年的实际发展水平，推算最末一年发展水平，可保证推算值\n与实际值相等。\n累计法:侧重考察全期实际累计总量，推算的最末一年水平通常不等于其实际水平。\n②水平法:从公式来看，只取决于最初水平和最末水平，与中间各期的水平无关，不能\n据此来推算中间各期的水平。\n累计法:等于实际各期发展水平的累计值，受期内各期发展水平的影响。\n③水平法：在实际运用中，如果现象发展在计划期内是持续上升或下降，目的是考察计\n划期最后一年的水平，如社会商品零售额、人口增长等指标时，可用此法计算平均发展速度。\n累计法：在实际运用中，如果关注的是全期总的发展情况而不仅仅是最后一年的水平高\n低，如考察基本建设投资完成额、植树造林面积数、累计安排再就业岗位数，或者期内各期\n水平大起大落时，采用累计法计算平均发展速度更加适宜。", "page": 32}, {"number": "8.3.4", "title": "平均增长速度 = 平均发展速度 − 1（或100%）", "content": "8.3.4 平均增长速度 = 平均发展速度 − 1（或100%）\n\n【注】平均增长速度（计算题）", "page": 32}, {"number": "8.4", "title": "长期趋势的测定", "content": "8.4 长期趋势的测定\n“时距扩大法”：通过时间合并的方式，把时间数列中各期水平所包括的时间长度扩大。\n时间数列项数减少，可消除季节变动、循环变动和不规则变动等因素影响。", "page": 32}, {"number": "8.4.1", "title": "移动平均法", "content": "8.4.1 移动平均法\n定义：通过对时间数列计算移动平均的方式，消除数列中隐藏的季节变动、循环变动和\n不规则变动的影响，进而反映长期趋势的方法。\n操作思路：对原有时间数列的数据逐项递推移动,计算一系列的序时平均数，并以这些\n移动平均数作为对应时期的趋势值。\n特点：\n(1)移动平均的项数越多，对数列修匀的作用也越大。当项数太多时，移动平均值在图\n形上会表现出平缓，与实际趋势不相吻合。\n(2)移动平均的项数可以是奇数，也可以是偶数。奇数项移动平均，则移动一次就可以\n得出趋势值。\n(3)数值存在自然周期时，移动项数应与其自然周期相一致。\n(4)计算采用了简单算术平均，各期指标值对趋势值的影响被等权处理。实践采用“加权”\n计算。\n(5)主要缺点：会损失时间序列的项数。\n(6)每次都直接计算移动平均值，计算工作烦琐。\n(7)不能得到实际的方程式，无法作为预测的常用工具。现象发展较稳定时，可用来进\n行外推预测。", "page": 32}, {"number": "8.4.2", "title": "数学模型法", "content": "8.4.2 数学模型法\n定义：采用适当的数学模型给动态数列拟合一个方程式，并据此计算各期的趋势值。", "page": 33}, {"number": "8.4.2", "title": ".2 最小平方法【最小二乘法】（2018）", "content": "8.4.2.2 最小平方法【最小二乘法】（2018）\n基本思路：拟合一条趋势线，使原数列各点到该趋势线的距离平方和最短。\n满足：\n(1)原数列的实际值\niy 与趋势值\niyˆ 之间的平均离差或离差总和为零，即\n(2)原数列的实际值\niy 与趋势值\niyˆ 之间的离差平方总和最小，即", "page": 33}, {"number": "8.5", "title": "季节变动的测定", "content": "8.5 季节变动的测定", "page": 33}, {"number": "8.5.1", "title": "按月平均法", "content": "8.5.1 按月平均法\n基本步骤：\n第一步，计算时间数列中各年同期的平均数：\nȳ_j = Σy_ij / N（j = 1, 2, ..., C，其中C为周期长度，N为年数）\n第二步，计算期内总平均 ȳ。\n第三步，计算季节指数：\nS_j = ȳ_j / ȳ（j = 1, 2, ..., C）\n第四步，对季节比率进行分析，绘制季节指数波动图，利用季节指数进行时间序列的预\n测分析等。", "page": 33}, {"number": "8.5.2", "title": "趋势剔除法", "content": "8.5.2 趋势剔除法\n基本步骤：\n第一步，根据原始数据序列\nijy 计算时间数列的长期趋势值(\nij\nT )。\n第二步，消除原始数据中的趋势变动。即计算各年内每月的实际值与相应的趋势值的比\n率，“修匀比率” ijr 。\n第三步，修匀比率重新排列，计算同期平均，消除不规则变动的影响\n第四步，从理论上讲，全期季节指数之和应等于C。但在趋势剔除过程中，常常会出现 ΣS_j ≠ C。需要调整，调整之后记为 S*_j = S_j × (C / ΣS_j)。\n第五步，对季节指数进行分析，绘制季节指数波动图，利用季节指数进行时间数列的预\n测分析等。", "page": 33}], "page": 27}, {"title": "第九章统计指数分析", "sections": [{"number": "9.1", "title": "统计指数的基本问题", "content": "9.1 统计指数的基本问题", "page": 35}, {"number": "9.1.1", "title": "统计指数的含义", "content": "9.1.1 统计指数的含义\n定义：\n①广义上，一切用以表明所研究事物发展变化方向及其程度的相对数。\n②狭义上，不以研究个别事物或简单现象的数量变动为主要任务，而以研究复杂现象\n总体某种数量的综合变化作为主要任务。", "page": 35}, {"number": "9.1.2", "title": "统计指数的主要作用", "content": "9.1.2 统计指数的主要作用\n①综合反映由多事物或多项目组成的复杂现象总体某一方面数量的总变动方向和程\n度。\n②对所研究现象总体的某种数量总变动进行因素分析。在现实中，很多现象的某种数\n量变动受多种不同因素的影响。\n③研究和反映事物的长期变动趋势。在连续编制的动态指数形成的指数数列中，可以\n发现事物的发展变化过程、规律和趋势，为更深入了解和掌握事物发展的本质提供依据。", "page": 35}, {"number": "9.1.3", "title": "统计指数的主要分类", "content": "9.1.3 统计指数的主要分类", "page": 35}, {"number": "9.1.3", "title": ".1 统计指数按考察范围不同，可以分为个体指数与总指数", "content": "9.1.3.1 统计指数按考察范围不同，可以分为个体指数与总指数\n个体指数：一般的相对数，即广义的指数。仅考察总体中单个事物或单个项目某一数量\n对比关系的相对数。\n总指数：狭义上的指数。通过总体数量对比关系，反映总体某种数量综合变动情况的相\n对数。按照编制的方法不同,总指数分为综合指数和平均指数两种。\n综合指数：应用综合法由两个总量指标对比而形成的指数。\n平均指数：应用加权平均法由个体指数的加权平均而形成的指数。", "page": 35}, {"number": "9.1.3", "title": ".2 统计指数按指数化指标的性质不同，可以分为数量指标指数与质量指标指数", "content": "9.1.3.2 统计指数按指数化指标的性质不同，可以分为数量指标指数与质量指标指数\n指数化指标：指数化因素。在指数中反映其数量变化或对比关系的指标。\n数量指标指数：指数化指标为某一数量指标的指数。反映总体某种数量指标变动的指数。\n常用于反映社会经济现象发展总规模、总水平或工作总量。用绝对数表示。\n质量指标指数：指数化指标为某一质量指标的指数。反映总体某种质量指标变动的指数。\n常用于反映社会经济现象相对水平或平均水平。用平均数或相对数表示。", "page": 35}, {"number": "9.1.3", "title": ".3 统计指数按对比性质不同，可以分为动态指数与静态指数", "content": "9.1.3.3 统计指数按对比性质不同，可以分为动态指数与静态指数\n动态指数：时间指数。通过不同时间上的同类现象水平对比来计算。考察的是同类现象\n的某种数量在不同时间上的发展变化情况。\n静态指数：包括空间指数与计划完成指数。\n空间指数：通过不同空间上的同类现象水平对比来计算。考察的是同类现象的某种\n数量在不同空间上的发展变化情况。\n计划完成指数：现象的实际水平与计划水平对比的结果。考察的是计划目标实现的\n程度。", "page": 35}, {"number": "9.1.4", "title": "统计指数的性质", "content": "9.1.4 统计指数的性质\n(1)综合性：统计指数综合反映由多事物或多项目组成的复杂现象总体某一方面数量总\n变动方向和程度的相对数，对多事物或多项目数量变动综合反映的结果。\n(2)平均性：统计指数所反映的综合变动实际上是多事物或多项目某一数量的平均变动，\n各事物或各项目某一数量变动的平均结果。\n(3)相对性。两层含义：\n第一层：统计指数都用相对数或比率来表示，属于相对数；\n第二层：编制总指数时要假定其他指标或因素不变的情况下反映指数化指标\n的变动情况，结果具有相对准确性。\n(4)代表性。在编制总指数时，由于所涉及的事物或项目太多，难以一一加以考虑，只\n能选择部分有代表性的事物作为依据。", "page": 36}, {"number": "9.2", "title": "综合指数", "content": "9.2 综合指数", "page": 36}, {"number": "9.2.1", "title": "综合指数的含义和特点", "content": "9.2.1 综合指数的含义和特点\n含义：\n①通过两个具有经济意义并紧密联系的总量指标对比求得的指数。\n②计算综合指数的分子和分母，由两个或两个以上因素所决定的总量指标。其中一个\n因素为指数化因素，其他因素是把不能直接相加的指数化因素转化为能直接相加量的因素，\n即同度量因素。\n特点：\n①先综合，后对比。\n②先综合：通过同度量因素，把总体中不能直接相加的各事物或各项目的指数化因素\n综合成为能直接相加的总量指标，解决复杂现象总体内各事物或各项目的数量不能直接相加\n或相加后不可比的问题。\n③后对比：在得到可比的总量指标的基础上，通过固定同度量因素的时间,选择两个合\n适的总量指标进行对比来得到所需要的指数。对比时，分子的指数化因素属于报告期,分母\n的指数化因素则属于基期。\n同度量因素还需要说明几点（2025）：\n1 在决定总量指标的各因素中，指数化因素与同度量因素的区分是相对的，互为同度\n量因素。\n2 在编制综合指数时，同度量因素的时空必须加以固定，分子、分母总量指标中的同\n度量因素的数量是相同的，才能反映指数化因素的变化情况。\n3 同度量因素在起到同度量时，也起一定的加权的作用。指数化因素与同度量因素乘\n积大(小)的事物，其指数化因素变动对总指数的影响就大(小)。\n4 在两因素的问题中，确定同度量因素的性质比较容易；在超过两个因素的问题中，\n确定同度量因素的性质就困难一些，注重各因素的内在联系。", "page": 36}, {"number": "9.2.2", "title": ".1 拉氏指数【9.2.2.1+9.2.2.2 的特点：回答“数量指标指数：指数的计算具有一定", "content": "9.2.2.1 拉氏指数【9.2.2.1+9.2.2.2 的特点：回答“数量指标指数：指数的计算具有一定\n的假定性”】\n特点（2025）：\n1 同度量因素的时间固定在基期，能单纯反映指数化因素的变动情况。\n2 用于编制定基指数时，确保各期指数的权数相同，能够比较客观反映指数化因素较\n长时期的变化过程。", "page": 37}, {"number": "9.2.2", "title": ".2 派氏指数", "content": "9.2.2.2 派氏指数\n质量指标指数：\n特点（2025）：\n1 同度量因素的时间固定在报告期，而报告期总是在变。因而在编制指数数列时,不同\n期指数的权数结构及分母总量都不同，不能直接对比。\n2 表面上看分子与分母的同度量因素都一样，分子与分母的指数化因素有差异，所计\n算的综合指数能反映指数化因素的总变动情况。\n实际上，同度量因素固定在报告期，包括由基期到报告期的实际变动，所计算的综合\n指数并不能单纯反映指数化因素的总变动。", "page": 37}, {"number": "9.3", "title": "平均指数", "content": "9.3 平均指数", "page": 37}, {"number": "9.3.1", "title": "平均指数的概念及特点", "content": "9.3.1 平均指数的概念及特点\n含义：计算总指数的另一种形式，个体指数的加权平均数，综合指数的变形和发展。\n特点：\n1 先对比，后综合。\n2 先对比：计算出所研究现象总体中各事物的指数化因素的个体指数，获得反映单个\n事物指数化因素数量变动的相对数。\n3 后综合：通过选择适当的权数，采用适当的加权方法，对指数化因素的个体指数进\n行加权平均，把单个的个体指数综合成为总指数。\n平均指数与综合指数联系和区别：\n1 联系：一定条件下两种指数公式存在变形关系。\n2 区别：出发点不同。综合指数从复杂现象总体总量出发，固定同度量因素，观察指\n数化因素的变动情况。平均指数从独立的个体事物出发，对个体数量的变化比率进行加权平\n均，观察总体数量的平均变化。", "page": 37}, {"number": "9.3.3", "title": "平均指数的应用", "content": "9.3.3 平均指数的应用", "page": 38}, {"number": "9.3.3", "title": ".2 用于编制居民消费价格指数", "content": "9.3.3.2 用于编制居民消费价格指数\n居民消费价格指数：反映一个国家或地区一定时期内，居民家庭所购买的生活消费品和\n服务项目的价格变动趋势与程度的指数。\n分类：从代表品的个体指数开始，逐级计算基本分类指数、中类指数、大类指数和总指\n数。\n代表品的个体价格指数：报告期平均价格与基期平均价格之比。\ni_p = p₁ / p₀\n基本分类价格指数：各代表品个体指数的简单几何平均数\nK = ⁿ√(i₁ × i₂ × ... × i_n) = ⁿ√(Π i_p)\n中类指数、大类指数和总指数：\nK = Σk·W / ΣW\n其中 k 为各基本分类（或中类/大类）的指数；\nW 为基期各类消费支出占总支出的比重。", "page": 38}, {"number": "9.4", "title": "平均指标指数", "content": "9.4 平均指标指数", "page": 38}, {"number": "9.4.1", "title": "平均指标指数的含义", "content": "9.4.1 平均指标指数的含义\n总平均指标指数：反映总平均数变动程度的指数。\n固定构成指数：反映各组变量值水平变动对总平均数变动影响程度的指数。\n结构变动影响指数：反映各组权数变动对总平均数变动影响程度的指数。", "page": 38}, {"number": "9.5", "title": "统计指数体系与因素分析", "content": "9.5 统计指数体系与因素分析", "page": 38}, {"number": "9.5.1", "title": "统计指数体系", "content": "9.5.1 统计指数体系", "page": 38}, {"number": "9.5.1", "title": ".1 统计指数体系的含义（常考）", "content": "9.5.1.1 统计指数体系的含义（常考）\n统计指数体系：由三个或三个以上具有内在本质联系的统计指数所组成的有机整体。\n主要目的：\n1 利用对复杂现象总体的数量变化，从相对数和绝对数两方面进行因素分析，说明现\n象总变动中各个影响因素的变动方向和影响程度。\n2 利用各个指数之间的数量关系，由已知的统计指数去推算未知的。", "page": 38}, {"number": "9.5.1", "title": ".2 构建统计指数体系的基本原则", "content": "9.5.1.2 构建统计指数体系的基本原则\n(1)各个指数之间必须保持等式关系，以便从相对数和绝对数两方面进行因素分析。相\n对数之间是乘除的关系，绝对数之间是加减的关系。\n(2)进行多因素分析时，必须分清各个因素的性质，选择合适的方法来编制各相关的指\n数。\n(3)保持与统计指数一般编制原则的一致性。质量指标指数采用派氏指数形式，数量指\n标指数采用拉氏指数形式。", "page": 39}, {"number": "9.5.2", "title": "因素分析", "content": "9.5.2 因素分析", "page": 39}, {"number": "9.5.2", "title": ".1 因素分析的意义", "content": "9.5.2.1 因素分析的意义\n定义：利用统计指数体系中各个指数之间的数量联系关系，对现象总体总变动的各个影\n响因素进行分解，分析各因素变动对现象总体总变动的影响程度和绝对效果。\n步骤（三步）：\n①明确分析研究的目的和要求，确定各影响因素之间的相互关系，构造合适的统计指\n数体系。\n②选用合适的指数形式计算反映现象总体总变动和各影响因素变动的指数。\n③从相对数和绝对数两方面对各影响因素进行综合分析和验证。", "page": 39}], "page": 35}], "国民经济核算": [{"title": "第一章总论", "sections": [{"number": "1.1", "title": "国民经济核算与国民经济核算体系", "content": "1.1 国民经济核算与国民经济核算体系", "page": 1}, {"number": "1.1.1", "title": "国民经济核算的性质和功能", "content": "1.1.1 国民经济核算的性质和功能\n定义：按照一套既定概念方法对一个经济总体进行的系统定量描述。采用统一的货币计\n量单位，运用一套相互有机联系在一起的账户和平衡表。用数据系统显示出一时期国民\n经济发展的整体状况。所提供的资料构成宏观经济信息系统的中心内容。为宏观经济管\n理和分析提供坚实的数据基础。\n对象：一国经济总体。\n功能：通过核算提供一套系统的数据来显示国民经济运行过程及其成果，作为进一步评\n价和分析的依据。\n特点：\n1 以宏观经济理论为基础，按一套符合国际惯例的概念、定义、分类和规则设计核算\n体系的框架。\n2 以货币作为统一的计量单位，对国民经济进行统一核算。\n3 引入复式记账原理，整个核算在数量上相互联系，形成一套逻辑严密、协调一致而\n完整的数据体系。\n满足以下方面的广泛需要【作用】：\n1 提供主要经济流量指标，监测国民经济运行情况。\n2 显现经济学所定义的经济过程中的因果机制，支持运用计量经济方法进行宏观经济\n分析，宏观管理和分析所关注的基本经济关系大多可以在核算中得到体现，核算中平衡关系\n体现了建立经济模型的基本要素。\n3 在宏观和微观层面上支持中长期计划的制定和计划目标的论证，为经济决策提供基\n础和依据。\n4 在核算日益国际化的前提下，为进行国际比较提供支持，服务于国际事务的管理和\n分析。\n5 在整个经济统计信息系统中发挥着重要的协调作用，保证相关统计框架所使用定义、\n分类的一致性，使不同资料来源的统计数据能够协调一致。", "page": 1}, {"number": "1.1.2", "title": "国民经济核算体系及其发展", "content": "1.1.2 国民经济核算体系及其发展\n定义：围绕国民经济核算所形成的一套理论和方法称为国民经济核算体系。\n内容：\n(1)国内生产总值核算：对一时期国民经济最终产品生产、分配和使用总量的核算。包括生产法国内生产总值表、收入法国内生产总值表、支出法国内生产总值表。\nGDP（生产法）= Σ(总产出 − 中间投入) = Σ增加值\nGDP（收入法）= 劳动者报酬 + 生产税净额 + 固定资产折旧 + 营业盈余\nGDP（支出法）= 最终消费 + 资本形成总额 + 货物和服务净出口 = C + I + G + (X − M)\n按照国内生产总值的不同计算方法，分别提供了各产业增加值形成、分配和最终产品使\n用方面的详细核算内容。\n(2)投入产出表：国内生产总值核算向生产领域的延伸，详细描述了不同产业部门之间\n相互提供、相互利用的中间产品流量，揭示国民经济各产业部门之间的技术经济联系。\n供给表：反映各产业部门生产的产品和各类产品的产业部门来源。\n使用表：反映各类产品的使用去向以及各产业部门的投入。\n投入产出表：全面反映产品部门之间的相互依存、相互影响关系。\n(3)资金流量核算：从收入分配和资金流动角度对国内生产总值核算的补充。\n非金融交易表：反映国民经济范围内的收入分配过程以及消费投资活动\n金融交易表：反映各部门参与金融交易的状况，表现一时期的资金运动状况。\n(4)资产负债核算：对一国和各部门经济存量的核算。一方面是非金融资产和金融资产\n的核算，另一方面是负债和资产净值的核算。\n(5)国际收支核算：反映一国当期对外经济交易及其收支平衡状况。\n国际投资头寸表：反映一国对外金融资产和负债的存量状况以及各种因素引起的存量变\n化。\n1. 2 国民经济核算的对象\n三个要素：一国经济的范围；国民经济中的各经济单位；各经济单位所从事的各种经济\n活动。", "page": 1}, {"number": "1.2.1", "title": "一国经济的范围", "content": "1.2.1 一国经济的范围\n定义：由该国政府实行有效经济控制的区域。区域内，该国公民、货物、资本可以自由\n流动，不受国界的限制。【比如驻外使领馆、科研站、军事基地、新闻办事处及援助机构等。】\n常住单位：一个单位在一国经济领土上拥有一定的活动场所,从事一定规模的经济活动，\n并超过一定的时期,认为该单位在这个国家具有经济利益中心，是该国的一个常住单位。", "page": 2}, {"number": "1.2.2", "title": "国民经济中的单位和部门", "content": "1.2.2 国民经济中的单位和部门\n1. 机构单位与机构部门分类\n定义：能够独立拥有资产、承担负债、从事经济活动并与其他单位进行经济交易的经\n济实体。进行经济决策的基本单位。\n突出特征：能够编制出一套包括资产负债表在内的完整的账户。\n两类经济单位具备机构单位条件：一类是由单个人或若干人组成的住户；\n另一类是得到承认的法律和社会实体。\n机构部门分类【答题：部门+包括+特征（职能）】：\n(1) 非金融企业部门。\n包括：国有企业单位、各种外资和合资合营企业单位、私营企业单位。\n职能：以营利为目的进行市场性经济活动，提供各种货物和非金融性服务。\n(2) 金融机构部门：所有主要从事金融活动的常住单位组成。\n包括：中央银行、商业银行、证券公司、保险公司及各种非银行性金融机构。\n职能：提供金融中介服务，在整个国民经济资金运动过程中发挥中介作用。\n(3) 政府部门。\n包括：中央政府和地方政府的行政机关、军队、警察、以国家财政拨款为主要资金\n来源的各种非营利性事业单位、社会团体。\n职能：①通过社会经济管理为居民和社会公众提供公共服务；\n②在全社会范围内对收入和财富进行再分配。\n(4) 住户部门\n包括：所有常住住户、住户拥有的、无法归属于企业的个体经营单位。\n职能：一是提供各种生产要素；二是进行货物和服务消费以满足人自身的需要。\n(5)\n为住户服务的非营利机构部门。\n职能：不按照政治程序设立。\n为工商企业提供服务的非营利机构归入企业部门。\n以政府为主要资金来源的非营利机构归入政府部门。\n为住户服务的私人非营利机构为独立的部门。\n(6)\n国外部门。\n包括：所有与该国常住单位发生经济往来的非常住单位的总和。\n2. 基层单位与产业分类\n定义：又称产业活动单位，在一个地点、从事一种或主要从事一种类型生产活动、具\n有相应收支核算资料的生产单位。只是生产决策的单位，难以进行独立的财务决策。", "page": 3}, {"number": "1.2.3", "title": "国民经济中的活动", "content": "1.2.3 国民经济中的活动\n生产过程：国民经济运行过程的首要环节。通过各种生产要素的组合利用，将各种投入\n转化为具有新的使用价值的产出，提供各种供人们消费使用的货物和服务，也创造新的价值。\n分配过程：将生产过程所创造的价值以各种收入形式分配给有关参与者。可能是以生产\n要素的投入为前提，交换性的。也可能是出于社会公平等目的而进行的非交换性分配。\n消费与积累：既是货物和服务的不同使用形式，又是各单位收入的最终支出形式。消费\n用于满足人们生活需要的使用，积累用于增加资产的使用。通过积累，各单位所持有的资产\n得以增加，下一轮生产活动将在一个扩大了的规模上进行，新一轮经济运行重新开始。\n交易：两个机构单位之间按照相互协议进行的活动。", "page": 3}, {"number": "1.2.4", "title": "经济流量与经济存量", "content": "1.2.4 经济流量与经济存量\n经济流量：反映一段时期内各种经济活动发生总量，体现经济价值的产生、转换、交换、\n转移和消失。\n经济存量：反映特定时点的经济资源拥有量，代表一种价值储备，表现为资产和负债的\n持有。\n二者关系：\n1 流量是在期初经济存量基础上发生的，改变了存量，使之从期初状态变化为期末状\n态。\n2 大部分流量是交易的结果，即各种交易中产生的资源流的汇总。\n改变经济存量的其他流量：\n①经济之外的因素引发的流量。\n②价格变化引起的持有资产损益，会导致资产负债存量变化。\n区分经济流量和经济存量：\n①经济流量：对生产、收入、消费、投资和其他积累的计量。\n经济存量：指对所拥有的资产和负债的计量。\n②经济流量可依据其与经济存量的关系分为两个部分：\n与经济存量没有直接关系的经常性交易流量；\n直接影响经济存量的资本性交易流量和其他流量。", "page": 4}, {"number": "1.3", "title": "国民经济核算的方法及内容组成", "content": "1.3 国民经济核算的方法及内容组成", "page": 4}, {"number": "1.3.1", "title": "国民经济核算的方法和基本规则", "content": "1.3.1 国民经济核算的方法和基本规则\n3. 记录时间的约定：权责发生制\n原因：经济交易完成包含不同步骤，步骤可能是分离的，发生在一个时间段内而不是在\n同一个时间点上。\n时间原则：\n1 现金收付制：以现金实际支付时间作为经济活动发生的时间。\n2 权责发生制：在交易事项发生之时记录经济活动的发生，经济价值被创造、转换、\n交换、转移或消失。强调产生应收应付关系的时间。", "page": 4}], "page": 1}, {"title": "第二章国内生产总值核算", "sections": [{"number": "2.1", "title": "国内生产总值核算的基本问题", "content": "2.1 国内生产总值核算的基本问题", "page": 5}, {"number": "2.1.1", "title": "生产的概念和核算范围", "content": "2.1.1 生产的概念和核算范围\n3.特定时空的生产核算范围【空间限定、时间限定】\n空间限定：\n1 “国内”范畴：就一国经济总体进行生产核算。\n2 包括该国经济领土上的所有常住单位的生产活动。\n3 “属地”原则：无论该单位所有权关系如何，属于该地的常住单位，其生产就应该包\n括在该地生产总值之中。\n时间限定：\n1 国民经济核算是指年度核算。\n2 为适应宏观管理及时性要求，最重要的经济总量，还需在更短的时间周期上提供生\n产总值数据。", "page": 5}, {"number": "2.1.2", "title": "生产者的定义和区分", "content": "2.1.2 生产者的定义和区分", "page": 5}, {"number": "2.1.3", "title": "产出及其类别", "content": "2.1.3 产出及其类别\n1.货物和服务体现了产出在外在形态上的基本差异：有形产出、无形产出。\n①货物是有形的产品。\n②服务是无形的产品。\n2.最终产品和中间产品\n区分依据：根据产品在国民经济范围内的使用性质\n定义：①中间产品：在一个生产过程中生产出来，又在另一个生产过程中被完全消耗\n掉的产品。\n②最终产品：当期生产的用于最终消费、积累和出口的产品。", "page": 5}, {"number": "2.1.4", "title": "国内生产总值的概念与核算思路", "content": "2.1.4 国内生产总值的概念与核算思路\n概念：\n1.在价值构成上，一国范围内各生产单位当期增加值的总和。从各单位总产出价值中扣\n除中间消耗之后的余额，代表该时期内各单位通过生产活动新增加的价值。\n2.从实物构成上看，一时期一国范围内各生产单位所生产的最终产品的价值总和。\n计算方法：\n①通过各产业部门增加值加总计算国内生产总值，包括生产法和收入法两种方法。\n②根据最终产品的使用去向计算国内生产总值，即支出法。", "page": 5}, {"number": "2.1.5", "title": "生产核算中的价格选择及其构成", "content": "2.1.5 生产核算中的价格选择及其构成\n生产者价格：指生产者向其产品购买者收取的价格。\n购买者价格：指购买者为购买产品而支付的价格。", "page": 5}, {"number": "2.2", "title": "增加值核算：生产法和收入法GDP", "content": "2.2 增加值核算：生产法和收入法GDP", "page": 6}, {"number": "2.2.1", "title": "增加值核算的基本问题", "content": "2.2.1 增加值核算的基本问题\n增加值两个角度计量：\n①生产法增加值核算的思路：从形成过程看，增加值是生产者当期生产的产品价值扣\n除所消耗的其他产品价值后的余值，即总产出减去中间投入之差。\n②收入法增加值核算的思路：从分配角度看，增加值被各生产参与者获得，通过将不\n同要素收入项目加总来计算增加值。\n计算公式：\n之和\n增加值各要素收入项目\n增加值\n中间投入\n总产出", "page": 6}, {"number": "2.2.2", "title": "总产出核算", "content": "2.2.2 总产出核算\n核算变化：\n①考虑在制品、半成品的情况。\n②考虑生产与销售的关系。生产的目的是出售，企业产品销售额资料是最容易收集到\n的。在任何给定的核算期内，被出售的货物可能有一部分是原先的存货；同时，本期生产的\n产品未必全部出售，会有一部分形成存货。\n③考虑自给性货物的特殊性。自给性货物生产没有实际发生的市场价格。\n④服务产出核算方法的变通。对服务生产来说，总产出核算无须考虑存货变化项目，\n但需解决非市场性服务活动的计量问题。需分为市场性服务产出和非市场性服务产出两部分\n核算。\n总产出核算方法：\n(1)工业总产出。“工厂法”\n工业性作业价值\n末期初存货变化价值\n工业半成品、在制品期\n工业成品价值\n工业企业总产出\n(2)农林牧渔业总产出。“产品法”\n价格\n产量\n农林牧渔业总产出", "page": 6}, {"number": "2.2.3", "title": "中间投入和固定资本消耗核算", "content": "2.2.3 中间投入和固定资本消耗核算\n1.中间投入核算\n中间投入：\n①在生产过程中消耗的非耐用性货物和服务的价值。\n②从实物形态看，包括生产经营过程中消耗的原料、材料、燃料、动力等货物、以及运\n输、邮电、金融、广告等服务。\n③从价值形态看，属于在生产过程中一次性转移到产品价值中的部分，本身不是在此阶\n段生产者自己创造的价值，在计算过程中，要从总产出价值中扣除掉。", "page": 6}, {"number": "2.2.4", "title": "增加值及其构成项目核算", "content": "2.2.4 增加值及其构成项目核算\n1.增加值的含义\n定义：各生产单位从总产出价值中扣除其中所含货物和服务消耗价值之后的余值。代表\n该生产单位汇集各种生产要素在生产过程中新创造的价值。\n净增加值更加符合增加值的定义，增加值就是指总增加值。\n净增加值更加符合增加值的定义的原因：\n①计算固定资本消耗的主观性和不确定性。在总产出、中间投入、固定资本消耗这几\n个计算要素中，总产出和中间投入是按照实际发生量计算出来的，客观度量的结果。\n固定资本消耗是根据主观确定的参数估算出来的。\n受固定资本消耗影响，净增加值结果也具有主观性，但总增加值则不受此影响，仍是客\n观度量的结果。\n②固定资本消耗与其实物对应上的特殊性。折旧代表原固定资产价值的贬值而不是实\n物量的减少，提取出来以后，并非直接用于替换被消耗的货物和服务，而是可以用于新资产\n的购置，直到原资产整体替换。\n在使用性质上，固定资本消耗与净增加值更为接近，适合于与净增加值加总起来一并作\n为形成收入的来源。\n2.增加值的核算\n(1)劳动者报酬：生产中劳动者要素所得。除工资以外，包括各种奖金、福利费用、补\n助和补贴，以及所在单位为劳动者缴纳的社会保险金等。\n(2)生产税净额：等于生产税与生产补贴的差额\n生产税：产品税、销售税、营业税等，不包含任何就企业利润、盈余及其他收入所缴纳\n的税收；\n生产补贴：看作一种负的生产税。\n(3)固定资本消耗：固定资产在生产过程中磨损的价值。\n(4)营业盈余：生产单位总产出扣除中间消耗、劳动者报酬、生产税净额和固定资产消\n耗以后的余额。", "page": 7}, {"number": "2.2.5", "title": "从增加值到国内生产总值：核算表及相关应用分析", "content": "2.2.5 从增加值到国内生产总值：核算表及相关应用分析\n2.生产法GDP 核算数据的应用分析节点【论述题】\n(1)产出角度的产业结构及各产业贡献率分析。通过生产法GDP 核算数据，可以计算各\n产业产出占国民经济产出的比例。从产出角度描述国民经济产业结构。\n(2)各产业增加值率分析。在原有价值之上追加了多少新增价值以及占有多大比例。\n两种表现形式：\n①增加值在总产出中所占比例；\n②增加值相对于中间投入的比例。\n(3)结合投入的生产率分析。总产出和增加值都代表产出，结合投入数据，即可。\n按照所选择的投入指标，生产率分析区分为以下两个方面：\n①以劳动投入为基础计算劳动生产率\n②以资本投入为基础计算资本产出率\n3.收入法GDP 核算应用分析\n各产业增加值在不同要素构成项目上的初次分配状况进行分析，表现生产过程中初步形\n成的经济利益关系：\n①劳动者报酬：体现生产中劳动要素的所得。\n②营业盈余：体现了生产过程中资本要素投入的最初所得。\n③生产税：体现了政府强制参与生产所获得的部分，是政府强制性征收的部分，具有一\n定程度的刚性。\n综上，现实中更加关注的是劳动报酬和营业盈余之间的分配关系，二者构成劳动与资本\n两种生产要素在增加值分配阶段的经济利益关系。", "page": 7}, {"number": "2.3", "title": "最终产品使用核算：支出法GDP", "content": "2.3 最终产品使用核算：支出法GDP", "page": 8}, {"number": "2.3.1", "title": "支出法GDP 核算的基本问题", "content": "2.3.1 支出法GDP 核算的基本问题\n货物和服务进口\n货物和服务出口\n资本形成总额\n最终消费支出\n国内生产总值\n3.从最终消费支出到实际最终消费\n①在最终消费支出核算中，主要是从消费支出承担角度区分个人消费和公共消费，即\n居民个人承担的消费支出和政府等部门承担的公共消费支出。\n②现实中，政府等部门承担了支出，实际上由住户部门的特定人群受益。这时，住户个\n人承担的消费支出显然要小于住户个人所实际获得的消费价值。\n③为此有必要从消费获得定义个人消费和公共消费，形成的消费概念称为实际最终消费。\n实物社会转移\n公共消费支出\n公共实际消费\n实物社会转移\n个人消费支出\n个人实际消费", "page": 8}, {"number": "2.3.3", "title": "资本形成核算", "content": "2.3.3 资本形成核算\n定义：代表用于资产积累的最终产品；从积累结果看，资本形成对应由于经济交易引起\n的生产资产当期净变化。\n1.对应生产资产的资本形成\n①生产资产：包括固定资产、存货和贵重物品等类别。\n②固定资产：一般在生产过程中充当工具。在生产中可以反复或连续使用的资产。\n包括：住房、其他房屋和建筑物、机器设备、牲畜和林木等培育性固定资产，以各种知\n识产权产品形式存在的无形固定资产。\n③存货：又称库存，作为生产过程的加工对象或辅助材料。各单位出于各种目的持有的、\n处于流动状态的货物。\n④贵重物品：价值贮藏手段而获得和持有的资产。\n2.固定资本形成核算\n固定资本形成：投资者通过交易所实现的固定资产积累。\n包括：住宅、其他建筑和构筑物、机器和设备、培育性生物资源、知识产权产品以及发\n生在非生产资产上的所有权转移费用。\n3.存货变化核算\n①当期生产大于当期使用，说明当期产品有一部分作为库存沉淀下来，存货变化为正；\n②如果当期生产小于当期使用，说明当期使用了以前时期生产的产品，则存货变化为负。", "page": 8}, {"number": "2.3.4", "title": "支出法GDP:核算表及其应用分析", "content": "2.3.4 支出法GDP:核算表及其应用分析\n1.最终消费率、资本形成率的计算与分析\n支出总额）\n国内生产总值（或国内\n资本形成总额\n资本形成率\n支出总额）\n国内生产总值（或国内\n最终消费\n最终消费率\n【简答】为什么计算最终消费率、资本形成率？：\n①国民经济宏观管理中，最终产品在积累与消费之间的分配是一个重要的比例关系，\n关系到当期消费与未来消费之间的关系、未来生产基础的扩大。关系到国民经济的可持续增\n长。\n②消费、积累、国外代表不同方面对GDP 的需求。分别计算最终消费率、资本形成率\n以及净出口占GDP 的比重，可以反映不同需求要素对于当期GDP 的贡献，显示当期GDP\n中分别有多少份额归结于最终消费的拉动或积累的拉动。\n【注意：Ⅰ.以进口抵减出口得到净出口，作为国外需求因素与消费、积累并列，可能\n会扭曲现实的经济关系。\nⅡ.实际上，刺激消费、扩大积累的诸多措施不一定直接拉动GDP 从而带动当地经济增\n长，原因在于消费、资本形成是从使用者角度定义的支出，并不一定对应国内生产的产品，\n也可能是购买进口品。\nⅢ.相对于国内生产而言，进口并非只是抵销了出口中的进口品，更抵销了最终消费和\n资本形成中的进口品，在消费、积累和国外三者之间存在着相互影响的关系。\nⅣ.如果消费支出购买的对象是进口品，GDP 就不会因为最终消费的变化而变化。当地\n消费是由国外供应来满足的，消费需求实际上拉动了国外的GDP 而不是当地GDP。】\n2.消费水平与消费结构的计算与分析\n消费：体现对当期生活需求的满足。最终消费支出数额的大小是反映民生状况的重要标\n识。\n计算要求：\n(1)以总人口为基数计算人均消费。\n(2)分别以农村人口和城镇人口为基数计算人均消费。\n(3)在有数据支持的情况下，还可以根据不同居民团体分别计算人均消费水平。\n3.关于资本形成的应用分析\n①目的在于通过增加资产增强未来时期的生产能力。\n②在资本形成核算基础上，应用分析常常集中于资本形成在不同产业的配置方面，反映\n资本形成在增量方面进行产业结构调整所发挥的作用。", "page": 9}, {"number": "2.4", "title": "GDP 总体核算及其扩展", "content": "2.4GDP 总体核算及其扩展", "page": 10}, {"number": "2.4.1", "title": "GDP 的总体核算", "content": "2.4.1GDP 的总体核算", "page": 10}, {"number": "2.4.2", "title": "中国GDP 核算及数据发布", "content": "2.4.2 中国GDP 核算及数据发布\n当前中国GDP 核算的整体状况做一简要总结：\n①中国GDP 核算包含两个思路：\n1.基于行业增加值加总计算；\n2.基于最终产品使用加总计算。\n②随着统计基础不断改进，中国已建立起一套相对成熟的GDP 核算方法。\n③以国家层面年度核算为基点，核算方法在此意义上确定的。\n④已建立起比较规范的GDP 数据发布和修订制度。", "page": 10}, {"number": "2.4.3", "title": "GDP 与其他相关经济总量", "content": "2.4.3GDP 与其他相关经济总量\n1.GDP 与GNI\n国民总收入（GNI）：\n定义：一国经济总体当期从国内生产和国外生产获得的生产性收入总量。\nGDP 和GNI 区别：\n①GDP 度量收入水平，GNI 度量生产能力；\n②一国常住单位生产的价值未必全部由本国常住单位获得.反之，一国获得的收入也未\n必全部是本国常住单位生产的。\n③一国对国外的劳务净输出越多、对外净金融投资规模越大，则来自国外的初始收入净\n额也越大。那些拥有庞大的对外净金融投资的国家，其国民总收入往往大于国内生产总值，\n通常是经济发达国家；反之，发展中国家的国民总收入往往小于国内生产总值。\n2.GDP 与NDP\n固定资本消耗\n国内生产总值\n国内生产净值\n【注：不包括固定资本消耗】", "page": 10}, {"number": "2.4.4", "title": "GDP 核算的扩展（常考）", "content": "2.4.4GDP 核算的扩展（常考）\nGDP 及其核算的局限性：\n①在GDP 及其核算中，没考虑资源环境与经济过程的关系，忽略经济产出的资源环境\n投入成本，忽略经济活动对资源环境的消耗和破坏。\n可持续发展意义上进行审视，GDP 的定义及其核算是有缺陷的。\n②GDP 核算只给出了当期可用于最终使用的经济产品总价值，本身并不等同于一国国\n民当期所获得的总福利，无法体现国民不同组成部分在经济产品以及福利获得程度上的差别。\n无法直接用于国民生活质量状况、分配均等状况等社会性问题的分析，对这些问题来说，\nGDP 的大小或多少充其量只是一个必要条件。\n建议：\n①克服这些缺陷，需修改GDP 定义，扩展GDP 核算的内容和方法，其结果就是综合环\n境经济核算。\n②GDP 核算有必要向福利核算、社会核算等方面扩展。", "page": 11}], "page": 5}, {"title": "第三章投入产出核算", "sections": [{"number": "3.1", "title": "投入产出表的结构与内涵", "content": "3.1 投入产出表的结构与内涵", "page": 12}, {"number": "3.1.1", "title": "投入产出表入门", "content": "3.1.1 投入产出表入门\n专栏3-1 你能准确理解投入产出表中数据的实际含义吗【理解投入产出表中数据的实际\n含义】\n问题一：第二产业行、固定资本形成总额列，数据为209593 亿元，它是否表示当年第\n二产业部门的固定资产投资为209593 亿元?\n答：（1）该数据不表示第二产业的固定资产投资，正确的理解应该是该产业产品中有\n209593 亿元被使用者购买形成了固定资产，这些购买使用者可能是第二产业的企业，\n也可能是第一产业、第三产业的经济单位。\n（2）因此，投入产出表中对应某部门的固定资本形成与一般统计中某部门的固定\n资产投资是完全不同的概念，前者从卖方定义而后者从买方定义。\n问题二：第一产业主要包括农林牧渔业，固定资本一般主要指厂房设备等，农林牧渔产\n品为何会形成3094 亿元的固定资本?\n答：（1）按照SNA-2008,农林牧渔产品中有一部分会用作固定资产，主要是指在机构\n单位控制下的多年生培育性生物资源，包括能重复提供产品的动物资源(主要指大牲畜)\n和能重复带来产出的树木、庄稼和植物资源。\n（2）因此，农林牧渔产品形成的固定资产是指大牲畜和林木的当期获得价值减去\n处置价值。当前我国编制的投入产出表中，农林牧渔产品固定资本形成主要发生在畜牧业，\n并未包括相关林产品。", "page": 12}, {"number": "3.1.2", "title": "根据投入产出表进行GDP 核算", "content": "3.1.2 根据投入产出表进行GDP 核算\n生产法：\n第三产业中间投入合计\n第三产业总产出\n第二产业中间投入合计\n第二产业总产出\n第一产业中间投入合计\n第一产业总产出\nGDP\n收入法：\n营业盈余合计\n生产税净额合计\n劳动者报酬合计\n固定资产折旧合计\nGDP\n支出法：\n进口合计\n出口合计\n存货净变化合计\n固定资本形成总额合计\n政府消费合计\n居民消费合计\nGDP\n【误差：对上面投入产出表计算，三个方法结果，生产法与收入法相等，支出法误差为\n2053 亿元】\n存在误差的原因（常考）：\n（1）核算范围的不完整，一些理论上认可的数据在实践中难以统计。\n（2）统计人员素质和统计体制的不足导致GDP 数据核算失真。\n（3）现行的GDP 统计报表可能在操作上存在困难，导致下级计算出的GDP 数值偏大。\n（4）GDP 核算时缺少现成的统计资料，需根据相关数据推算，存在误差。\n（5）统计报表中存在的有待完善之处，存在的少记支出部分.", "page": 12}, {"number": "3.1.3", "title": "投入产出表的优势【简答题重点】", "content": "3.1.3 投入产出表的优势【简答题重点】\n投入产出表最基本的优势：\n1 告诉中间投入的总量是多少，说明中间投入的构成；\n2 告诉居民消费、固定资本形成、出口和进口的总量，能显示消费、出口和进口了哪\n些产品，新增固定资本的构成如何；\n3 告诉总劳动者报酬、营业盈余等，能说明各部门的情况。\n4 通过其多部门结构，将各部门间错综复杂的关联关系以最简洁明的方式揭示，把生\n产过程曝光。\n5 主要优势：其对经济中普遍存在的相互依存关系的描述。在此基础上，一般均衡的\n思想终于有了一个理论与现实之间的桥梁。", "page": 13}, {"number": "3.2", "title": "投入产出表的数据口径", "content": "3.2 投入产出表的数据口径", "page": 13}, {"number": "3.2.1", "title": "投入产出表中的部门", "content": "3.2.1 投入产出表中的部门\n定义：\n①产品部门的基础：同质生产单位。\n②同质三重含义：经济用途一致；消耗结构相同；生产工艺技术相同。\n同质生产单位与基层单位的区别：\n①基层单位只能包括一种生产活动。\n②同质生产单位既包括主要生产活动，又包括次要生产活动。\n【注：从应用角度看，标准的投入产出表：产品部门×产品部门表】", "page": 13}, {"number": "3.2.2", "title": "投入产出表中的价格", "content": "3.2.2 投入产出表中的价格\n投入产出核算有关的价格主要有三种：基本价格、生产者价格和购买者价格。\n(1) 购买者价格：购买者购买单位货物或服务所实际支付的价格。\n(2) 生产者价格：生产者向购买者收取的购买者价格扣除商业附加和运输费用之后的部\n分。\n(3) 基本价格：生产者价格扣除生产者所支付的产品税净额后的部分。\n三者之间的关系：\n购买者价格\n毛利\n批发商和零售商的商业\n另行支付的运输费用\n税\n购买者的不可抵扣增值\n生产者价格\n产品补贴\n产品税\n基本价格", "page": 13}, {"number": "3.2.3", "title": "投入产出表的具体部门分类", "content": "3.2.3 投入产出表的具体部门分类\n比较常用的部门分类：\n①国际标准产业分类\n②GTAP 部门分类体系第二版。", "page": 14}, {"number": "3.2.4", "title": "进口的处理", "content": "3.2.4 进口的处理\n进口品的处理方式：Ⅰ.把进口品作为一列；Ⅱ.将进口品按使用方向详列成矩阵。\n1.进口品作为一列\n投入产出表：\n①行的方向：产品的使用去向，每一个使用去向都会包括对进口品的使用。\n处理方法：投入产出表的第Ⅱ象限设置一个进口列。\n2.进口品详列成矩阵\n进口品详列为矩阵：把总进口列按照各种进口品的使用方向扩展成矩阵，保证其使用\n方向分类与投入产出表的使用方向分类一致。", "page": 14}, {"number": "3.3", "title": "投入产出表的编制方法", "content": "3.3 投入产出表的编制方法", "page": 14}, {"number": "3.3.1", "title": "供给表和使用表", "content": "3.3.1 供给表和使用表\n供给表：\n①行的角度：观察各种产品由哪些产业部门生产的；\n②列的角度：观察各产业部门生产了哪些产品。\n使用表：采用产品部门×产业部门口径，内容相对复杂一些。主要回答产品到哪里去的\n问题。", "page": 14}, {"number": "3.3.3", "title": "间接推导法", "content": "3.3.3 间接推导法\n1.数据基础\n代表性元素V 表示第i 个产业部门当期所制造的第j 种产品的数量。\nUij 表示第j 个产业部门当期所使用的第i 种产品的数量\n2.推导公式\n投入系数 h_ij：第j个产业部门生产1单位总产出所投入的第i种产品的数量，记为矩阵 H。\n公式：h_ij = U_ij / X_j\n部门的产品比例系数 c_ij：第i个产业部门总产出中j产品产值所占比重，记为矩阵 C。\n公式：c_ij = V_ij / X_i\n产品的部门比例系数 d_ij：j产品中由i产业部门生产部分所占的比重，记为矩阵 D。\n公式：d_ij = V_ij / Q_j\n按照部门工艺假定，产品×产品投入产出系数矩阵 A_d 的计算公式为：\nA_d = H × D\n第j个产品部门单位总产出所投入的i产品的数量。\n按照产品工艺假定，产品×产品投入产出系数矩阵 A_c 的计算公式为：\nA_c = H × C\nRAS 法（双比例尺度法）\n基本思想：\n①基年和目标年的投入结构完全相同。即每个部门各种中间投入品占总投入的比例不\n变，目标年的各部门总产出乘以基年相应部门各种中间投入占总投入的比例，所得中间投入\n矩阵。\n其行合计等于目标年的中间使用合计\n其列合计等于目标年的中间投入合计。\n②计算结果不相等，必是投入结构发生了变动，需要对基年结构进行调整。\n调整后满足目标年的各部门总产出计算出的中间投入矩阵的行合计、列合计，与目标年\n中间使用合计、目标年中间投入合计相同。\n③行向控制量为目标年中间使用合计，列向控制量为中间投入合计。", "page": 15}, {"number": "3.4", "title": "投入产出表的应用", "content": "3.4 投入产出表的应用", "page": 16}, {"number": "3.4.1", "title": "投入产出系数", "content": "3.4.1 投入产出系数\n1.各种直接投入产出系数及其含义（2025）\n直接消耗系数 a_ij：j部门生产1单位总产出对i部门产品的消耗量。\n公式：a_ij = x_ij / X_j（其中 x_ij 为j部门对i产品的中间消耗，X_j 为j部门总产出）\n直接分配系数 r_ij：i部门产品分配给j部门使用部分所占比例。\n公式：r_ij = x_ij / X_i（其中 X_i 为i部门总产出）\n优势：\nⅠ.剔除部门规模的影响，更直接反映出由经济技术因素决定的部门投入结构和部门间\n的依赖程度。具有可比性和分析意义。\nⅡ.投入产出表的应用中，分析基础是各类投入产出系数，而非各种流量。\n2.完全消耗系数及其含义（2025）\n完全消耗系数 b_ij：完全消耗系数矩阵 B = (I − A)^(−1) − I\n含义：为生产j部门单位最终产品，对i部门中间产品的完全消耗量。换言之，i部门\n必须为整个经济系统提供 b_ij 数量的中间产品，j部门的1单位最终产品才有可能生产出来。\n基于完全消耗系数，可以进一步计算针对各个部门的影响力系数与感应度系数:\n1 影响力系数：完全消耗系数矩阵的列和除以完全消耗系数各列和的平均值。\n感应度系数：该矩阵的行和除以完全消耗系数各行和的平均值。\n2 列向看：完全消耗系数衡量j 部门生产单位最终产品对各部门产品的完全消耗量，\n合计代表j 部门最终需求增加所能拉动的各部门生产活动的规模，即后向关联。表示该部门\n对其他部门的影响。\n3 行向看：完全消耗系数表示各部门增加单位最终需求所增加的对j 部门产品的完全\n消耗量，衡量的关联通过j 部门产品被卖给其他部门而发生的，即前向关联。表示该部门\n对其他部门变化的反应。\n4 计算中要除以完全消耗系数各列和或各行和的平均值：为了通过一个更好的参照系\n来判断各部门影响力系数与感应度系数的大小，以确定具有强关联程度的部门。\n5 一般来说，部门影响力系数与感应度系数都大于1,认为该部门为关键部门。\n6 影响力系数与感应度系数背景完全不同。一个适用于萧条，一个适用于繁荣，任何\n时刻评价一个部门的关联程度，只能选择一个系数。\n影响力系数：类似于凯恩斯理论的乘数。背景：经济萧条，生产能力过剩，新增需\n求才能得到满足；否则，处于经济繁荣期，没有剩余的生产能力，部门增加对投入品的购买，\n其他部门也无法满足新增需求。\n感应度系数：类似于加速度。背景：经济繁荣，生产能力已充分利用，成为限制生产\n规模的主要力量，得不到足够的投入品，部门不能继续扩大生产规模。", "page": 16}, {"number": "3.4.2", "title": "投入产出建模", "content": "3.4.2 投入产出建模\n2.投入产出需求拉动模型的构建\n总产出 X = (I − A)^(−1) × Y（其中 Y 为最终需求列向量，A 为直接消耗系数矩阵）\n3.投入产出需求拉动模型的应用\n①使用需求拉动模型进行影响分析。即分析各种经济措施、政治经济事件对所感兴趣问题的影响。\n影响效应 ΔX = (I − A)^(−1) × ΔY（其中 ΔY 为最终需求变动列向量）\n②基于地区间投入产出表，采用与单地区投入产出表相同的方法，构建地区间投入产\n出模型。\n③考虑异质性的投入产出表。模型强调同质性，只有满足同质性条件，投入产出系数\n才是目前相对稳定，已有较多考虑异质性的投入产出表被设计和编制出来。\n异质性最主要的考虑维度：企业区分为国内企业与外资企业。", "page": 17}], "page": 12}, {"title": "第四章资金流量核算", "sections": [{"number": "4.1.2", "title": "资金流量核算的基本框架和规则", "content": "4.1.2 资金流量核算的基本框架和规则\n基本框架：\n①来源：记录应收资金，即非金融交易下的收入和金融交易下的负债净增加。\n②运用：记录应付的资金，即非金融交易下的支出和金融交易下的金融资产净获得。\n总体原则：\n(1)\n四式记账方法。每一笔交易都会在核算中得到双重反映。\n对收入分配交易：一个部门的收入会对应另一个部门的支出，在特定交易项目下，\n分别记入收入的来源方和支出的运用方；\n对金融交易：一个部门的金融资产增加(或减少)会对应另一个部门的负债增加(或减\n少)。在特定交易项目下，运用方记录金融资产增加/减少，来源方记录负债增加/减少。\n(2)权责发生制原则：记录各机构部门间收支、转移、资金交易时，将所有权或责任确\n认的时间作为核算时间标准，据此凡发生在当期的收支，无论款项是否结算，均作为本期\n交易予以核算。\n(3)以现期市场价格作为计价依据。既涉及各种生产要素价格、货物和服务价格，又涉\n及货币市场交易价格、资本市场交易价格。\n两类平衡关系：\n各部门内部的平衡关系：来源列合计数额等于运用列合计数额；\n各部门之间的平衡关系：反映社会资金在特定交易流量上的来源和去向。每一个交易项\n目，各部门来源方合计数额等于运用方合计数额。", "page": 18}, {"number": "4.1.3", "title": "非金融交易核算的基本问题", "content": "4.1.3 非金融交易核算的基本问题\n1.核算内容\n非金融交易部分的内容以下流程：", "page": 19}, {"number": "4.2", "title": "收入分配与使用核算", "content": "4.2 收入分配与使用核算", "page": 19}, {"number": "4.2.2", "title": "收入分配的基本流程", "content": "4.2.2 收入分配的基本流程\n收入初次分配：从不同生产要素出发，依据各要素对生产的贡献所进行的分配，使各要\n素所有者从分配中获得收入。包括劳动者报酬、财产收入、生产税净额。\n收入再分配：各部门经过收入再分配之后获得的收入总额，即可支配收入。", "page": 19}, {"number": "4.2.3", "title": "收入初次分配核算", "content": "4.2.3 收入初次分配核算\n1.收入形成核算\n雇员报酬（劳动者报酬）包括：\n1)\n工资。\n2)\n各种形式的奖金、津贴、其他劳务收入。以及雇主单位为雇员提供的各种作为劳\n动者报酬的实物福利。\n3)\n雇主单位代雇员向社会保险计划缴纳的款项。\n4)\n针对雇员的股票期权。在授权日按照相应估价计入。\n(1)财产收入。\n定义：由于资产的所有者将其所拥有资产的使用权让渡给其他单位使用，从对方获得的\n回报。资产只让渡了使用权，没改变所有权。\n包括内容：\n1)\n利息：金融债权类资产所有者应收的一种财产收入。产生利息的金融资产包括存款、\n贷款、股票以外的证券及其他应收应付款项。\n2)\n红利：企业已分配的、股票和股权所有者应收的财产收入。\n3)\n外国直接投资的再投资收益：外国直接投资企业未分配利润中按照股权比例应属\n于外国直接投资者的部分。\n4)\n投资收入：包括属于投保人的投资收入、养老金权益的应付投资收入及投资基金股\n东集体的投资收入。\n5)\n地租：土地或地下资产所有者从承租方获得的收入。地下资产的租金常称为特许权\n使用费。\n(2)初始收入与国民总收入。\n初始收入：\n定义：各部门经过收入初次分配之后获得的生产性收入的总额。\n公式：\n财产收入净额\n得到的生产税净额\n支付的生产税净额\n支付的劳动者报酬\n增加值\n财产收入净额\n得到的劳动者报酬\n生产税净额\n支付的劳动者报酬\n增加值\n财产收入净额\n生产税净额\n支付的劳动者报酬\n增加值\n初始收入\n政府\n住户\n企业\n国民总收入：\nGDP 与GNI 之间的推导关系：\n额\n来自国外的财产收入净\n来自国外的生产税净额\n来自国外的劳动者报酬\n配流量净额\n来自国外的初始收入分\nGDP\nGDP\nGNI", "page": 19}, {"number": "4.2.4", "title": "收入再分配核算", "content": "4.2.4 收入再分配核算\n1.转移\n定义：一个机构单位向另一个机构单位提供货物、服务或资产，并未从后一机构单位处\n获得任何货物、服务或资产作为回报。\n两种类型的转移：①经常转移；②资本转移\n区分根据：\n1 是不是资产：如果是资产，则为资本转移，否则为经常转移；\n2 对象本身不是资产，但接受转移一方以形成资产为目的使用，应归入资本转移。否\n则为经常转移。\n3 资本转移：规模大、频率低、发生无规律。只影响接受一方的投资水平，不影响其\n消费水平，不属于收入范畴，作为与投资有关的资金筹集活动，在非金融资产投资环节核\n算。\n经常转移：规模小、频率高、常常是定期发生。能够提高接受一方在核算期的消费\n水平，属收入范畴。在收入再分配环节核算；\n2.经常转移的类型\n(1)\n经常税：包括个人所得税、企业所得税、资本收益税(如利息税)、彩票收入税等。\n(2)\n社会保障缴款和社会保险福利：如失业金、养老金和报销医疗费等。\n(3)\n社会救济福利：如住户从政府、企业和为住户服务的非营利机构领取的各种优恤补\n助、社会救助和社会福利。\n(4)\n其他经常转移。包括政府部门内部的转移(比如政府财政对社会保障计划的补贴)、\n各国政府间转移、政府向国际组织缴纳的会费、各种罚没、围绕为住户服务的非营利机构发\n生的各种缴纳和资助、常住住户和非常住住户间的经常转移、非寿险的净保费与赔付、抽彩\n赌博以及赔偿等。\n3.可支配收入与国民可支配收入\n额\n来自国外的经常转移净\n额\n来自国外的初始收入净\n国内生产总值\n额\n来自国外的经常转移净\n国民总收入\n国民可支配收入\n经常转移支出\n经常转移收入\n初始收入\n可支配收入\n①一国接受的来自国外的转移净额为正值。国民可支配收入大于国民总收入。\n②一般来说，国际经常转移主要体现为发达国家对发展中国家的援助，因此发展中国\n家的国民可支配收入往往大于国民总收入，发达国家则相反。\n4.实物社会转移与调整后可支配收入\n实物社会转移：政府和为住户服务的非营利机构向个别住户以实物转移形式提供的个人\n货物或服务。可支配收入的基础上，考虑实物社会转移，得到调整后可支配收入。", "page": 20}, {"number": "4.2.5", "title": "收入使用——消费与储蓄的核算", "content": "4.2.5 收入使用——消费与储蓄的核算\n最终消费支出：\n定义：当期用于获得最终消费用货物和服务所花费的支出。\n主体有三类：政府部门、为住户服务的非营利机构部门、住户部门。\n可支配收入：\n定义：用于最终消费支出之后的余额，等于调整后用于实际最终消费之后的余额。这一\n余额即为储蓄。\n储蓄：代表收入用于消费之后的节余。", "page": 21}, {"number": "4.3", "title": "非金融投资核算", "content": "4.3 非金融投资核算", "page": 22}, {"number": "4.3.2", "title": "非金融投资核算", "content": "4.3.2 非金融投资核算\n2.非金融投资的核算\n(1) 资本形成核算。包括固定资产净获得、存货变化、贵重物品净获得。\n(2)非生产资产投资核算：\n非生产资产投资：包括有形非生产资产投资和无形非生产资产投资。\n有形非生产资产：自然资源。包括：被纳入经济资产范围的土地、矿物、非培育性生物\n资源、水资源，以及诸如无线电频谱等其他资源；\n无形非生产资产：包括合约、租约、许可，以及商誉和营销资产。\n3.改道处理：\n定义：有形非生产资产的交易发生在常住单位与非常住单位之间，要对常住单位实施改\n道处理", "page": 22}, {"number": "4.3.3", "title": "非金融投资资金来源和资金余缺的核算", "content": "4.3.3 非金融投资资金来源和资金余缺的核算\n非金融投资的自有资金来自两个方面：①本部门的储蓄；②其他单位的资本转移净额\n资本转移的具体类型：包括资本税、投资补助和其他资本转移等。\n资本税、投资补助：政府主导。\n其他资本转移：发生在各个机构部门以及国外之间。\n如何弥补调节储蓄与投资之间的不一致?\n1 机构单位资金有余，需通过金融市场将剩余资金出借给其他单位使用，形成该单位\n的金融资产；\n2 机构单位资金有缺，需通过金融市场从其他单位借入资金，形成该单位的负债。\n3 一个机构部门在当期的投资资金余缺，表示为在金融市场的净贷出或净借入,代表该\n部门的净金融投资。\n4 调节国内机构部门之间的储蓄投资差，依赖国内金融市场；\n5 从一国经济总体看，对储蓄投资差进行调节，需借助国际金融市场。即参与国际金\n融投资。", "page": 22}, {"number": "4.4", "title": "资金流量表(非金融交易)及其应用分析", "content": "4.4 资金流量表(非金融交易)及其应用分析", "page": 22}, {"number": "4.4.1", "title": "资金流量表——非金融交易部分", "content": "4.4.1 资金流量表——非金融交易部分\n资金流量表两个基本的平衡关系：①纵向平衡；②横向平衡。\n内部平衡关系：\n来源列项目合计\n运用列项目合计=\n部门间的平衡关系：\n各部门来源合计\n各部门运用合计=", "page": 22}, {"number": "4.4.2", "title": "资金流量表的应用分析", "content": "4.4.2 资金流量表的应用分析\n1.交易项目分析——机构部门占有结构及流动结构分析。\n两个层次：①对实际交易项目及其部门结构的分析，属经济运行过程的分析；\n②对平衡项及其部门结构的分析，属经济运行结果的分析。\n2.机构部门的分析——部门内部的交易特征分析。\n两个层次：①每个运行环节内部分析。\n②通过平衡项的起承转合，相邻环节结合起来分析。\n3.经济总体分析。\n基本思路：通过将资金流量核算中的相关指标结合起来，得到一些相对数指标，揭示国\n民经济资金循环过程的特点。最典型的分析：从需求拉动的角度对经济增长的分析。", "page": 23}], "page": 18, "intro": ["2.资金流量的结构：", "使资金流量核算作为宏观核算工具，须将各种金融交易流量与整个国民经济实际资源流", "量联系起来。", "两种选择：", "①以总储蓄为起点；", "②将核算范围进一步扩展到包括收入分配交易", "核算范围：最宽口径", "非金融交易核算和金融交易核算：", "(1) 非金融（实物）交易核算：覆盖从收入分配到非金融投资的价值收支过程。", "从功能看，体现了对国内生产总值核算内容的进一步延伸。", "与金融交易核算衔接的基础上，集中提供收入分配过程、收入使用过程、非金融投", "资以及资金筹集过程的详细信息。", "(2) 金融交易核算：国民经济过程中的金融活动进行核算。", "主要功能：反映由金融交易所形成的资金流量和流向。从宏观上勾画出一时期与实体经", "济对应存在的金融经济的图景。"]}, {"title": "第五章资金流量核算——金融交易", "sections": [{"number": "5.1", "title": "金融资产与金融交易", "content": "5.1 金融资产与金融交易", "page": 24}, {"number": "5.1.1", "title": "金融资产及其分类", "content": "5.1.1 金融资产及其分类\n2.金融资产的类型\n(1)货币黄金和特别提款权。(2)通货和存款。(3)债务性证券。(4)贷款。(5)股权和投资基\n金份额。(6)保险、养老金和标准化担保计划。(7)金融衍生工具和雇员股票期权。(8)其他应\n收应付款。包括商业信用和预付款，及其他各种应收应付款项。", "page": 24}, {"number": "5.1.2", "title": "金融交易", "content": "5.1.2 金融交易\n1.金融交易\n定义：\n1 涉及机构单位金融资产所有权变化的所有交易。\n包括：金融债权、负债的产生和清偿。\n2 一个机构单位一方面会形成或处置其金融资产，两相抵销后体现为金融资产的净增\n加，即净获得;\n另一方面会发生或清偿各种债务，两相抵销以后体现为负债的净增加，即净发生。\n3 金融资产净获得减去金融负债净发生，结果为该单位的净金融投资，即净贷出/净借\n入。\n在第一类交易中，金融资产所有权的变化是为了充当实物交换的媒介。\n在第二类交易中，机构单位之间交易的对象不涉及实物，只限于金融资产。\n2.金融交易与非金融交易的关系\n1 在金融交易核算中，某部门的金融资产变化不等于其负债变化，则出现净金融投资;\n在非金融投资核算中，非金融投资规模与其投资资金来源不相等，也会出现净金融投资。是\n同一个概念。机理在于金融交易与非金融交易之间的对应关系。\n2 非金融投资核算的净金融投资和金融交易的净金融投资之间的恒等，不仅是一种代\n数关系，而且内在的经济意义。\n一个机构单位的非金融投资出现资金盈余，增加该单位的金融资产或减少其负债，使\n金融交易中的净金融投资为正值；\n反之，短缺的资金须从其他单位借入，使金融交易中的净金融投资为负值。\n金融交易的净金融投资：非金融投资中资金余缺的调剂方式。", "page": 24}, {"number": "5.2", "title": "金融交易核算及核算表", "content": "5.2 金融交易核算及核算表", "page": 24}, {"number": "5.2.1", "title": "金融交易的核算原则", "content": "5.2.1 金融交易的核算原则\n1 国民经济核算的一般原则：权责发生制、市场价格原则。\n2 金融交易核算执行取净额和合并原则。纯粹的金融交易，应在金融资产所有权转移\n的时点进行记录；\n3 权责发生制：对于以货币为媒介的非金融交易中的金融交易，应在货物所有权转移\n或服务完成的时点进行记录。\n4 市场价格原则：金融资产的价格应按照金融资产获得或转让的实际价格进行记录。\n但不应包含手续费等付款，这些付款应作为服务交易处理。\n5 取净额：针对同一个机构单位，只记录金融资产净增加和负债净增加。\n金融资产净增加：金融资产获得减去金融资产处置的净额。\n负债净增加：负债发生减去负债清偿的净额。\n6 合并原则：汇总部门内各机构单位数据作为部门核算数据时，部门内各机构单位之\n间发生的同类交易要相互抵销，以合并后的数据反映该部门与其他部门之间的交易。", "page": 24}, {"number": "5.2.2", "title": "金融交易核算的基本内容", "content": "5.2.2 金融交易核算的基本内容\n（与金融资产类型一致，“类型”+“的核算”）", "page": 25}, {"number": "5.2.3", "title": "资金流量表——金融交易部分", "content": "5.2.3 资金流量表——金融交易部分\n1.资金流量表——金融交易部分\n2.金融交易核算的平衡关系\n①部门内部的平衡关系；②部门之间的平衡关系。\n一个部门内部：\n净金融投资\n负债净增加\n金融资产净增加\n从部门之间来看，针对特定金融交易项目，各部门在来源方的记录合计等于各部门在运\n用方的记录合计：\n各部门负债净增加合计\n合计\n各部门金融资产净增加\n（或负载减少）\n其他部门金融资产增加\n一部门负载增加\n金融资产减少）\n其他部门负债增加（或\n一部门金融资产增加\n平衡关系推广到一个经济总体，表现为：\n对国外净金融投资\n国内负债净增加\n国内金融资产净增加", "page": 25}], "page": 24}, {"title": "第六章资产负债核算", "sections": [{"number": "6.1", "title": "资产负债核算的基本问题", "content": "6.1 资产负债核算的基本问题", "page": 26}, {"number": "6.1.1", "title": "经济资产的定义及其分类", "content": "6.1.1 经济资产的定义及其分类\n经济资产：价值贮藏手段。价值从一个核算期转移到另一个核算期的载体。反映经济所\n有者在一段时期内通过持有或使用该实体所生成的一次性或连续性经济利益。\n生产资产：\n1 包括固定资产、存货、贵重物品。\n2 固定资产、存货：生产者为了生产目的而持有的资产\n贵重物品：作为价值贮藏手段持有的资产。\n3 固定资产：生产资产的最主要成分。在生产过程中充当生产工具，在很大程度上体\n现了生产能力，决定了生产规模。", "page": 26}, {"number": "6.1.2", "title": "资产负债核算及其意义", "content": "6.1.2 资产负债核算及其意义\n1.资产负债核算的意义\n1 资产负债：代表经济存量，与投入产出、收入支出、消费积累等经济流量之间具有\n密不可分的联系。\n经济存量：各种经济流量的沉淀积累形成。经济运行过程的起点，构成流量形成的基\n础。\n2 从国民经济宏观管理看，资产负债总量：代表一经济体所具有的生产和收入创造能\n力，结构反映了整个经济的资源配置状况。\n3 一旦所持有的资产负债达到一个临界状态，根本上制约经济发展，严重甚至会导致\n经济体系的崩溃。\n4 将资产负债核算纳入国民经济核算体系，并与其他四个流量核算子体系相结合，全\n面系统地反映国民经济运行全过程及其所产生的综合效果，使国民经济核算体系在结构上\n形成“期初资产负债—生产—收入分配—消费积累一国外交易—物量与价格调整—期末资\n产负债”完整经济循环模式，实现流量核算与存量核算的有机统一。\n2.资产负债核算的主要内容\n①时点存量的总量核算；\n②时期内的存量变化核算。", "page": 26}, {"number": "6.1.3", "title": "资产负债核算的基本原则", "content": "6.1.3 资产负债核算的基本原则\n1.所有权原则\n所有权原则：资产负债核算中确定资产负债核算范围、资产负债部门所属类别时采用的\n原则。\n2.记录时间原则\n两方面的记录时间：\n①资产、负债和资产净值要在特定时点上记录。从一个核算期间看，一般关注的是期初\n和期末两个时点，采用日历年度的年初和年末作为期初和期末时点。\n②机构单位或机构部门在记录资产负债变化时，应按权责发生制原则确定记录时间，在\n债权和债务关系发生、转移或取消时予以记录。\n3.估价原则\n①对于资产负债存量的记录。应按照核算时点的现期市场价格估价；\n②对于资产负债变化。应按照交易发生时的实际价格或者资产其他物量变化发生时资产\n的现行市场价格进行记录。", "page": 27}, {"number": "6.2", "title": "资产负债时点存量核算", "content": "6.2 资产负债时点存量核算", "page": 27}, {"number": "6.2.1", "title": "资产负债存量核算的基本思路", "content": "6.2.1 资产负债存量核算的基本思路", "page": 27}, {"number": "6.2.5", "title": "资产净值的核算", "content": "6.2.5 资产净值的核算\n负债\n金融资产\n非金融资产\n资产净值", "page": 27}, {"number": "6.2.6", "title": "国民资产负债表", "content": "6.2.6 国民资产负债表\n主栏按照资产和负债项目分列，主要包括三个部分：\n(1)\n资产：包括非金融资产和金融资产；\n(2)\n负债：即金融负债；\n(3)\n资产净值：即资产总额与负债总额之差。为突出反映国际储备状况，项目中单列国\n际储备项目。\n2.资产负债表中的主要平衡关系\n从纵列看，对每一个部门以及经济总体内部，都有：\n资产净值\n负债\n金融资产）\n资产总额（非金融资产\n反映部门内部的平衡关系。即该部门资产负债在具体项目上的分布状况以及净资产\n的形成。\n从横行看，对每一个资产负债项目，都有：\n债）\n经济总体的资产（或负\n合计\n各部门资产（或负债）", "page": 27}, {"number": "6.3", "title": "资产负债存量变化(积累)核算", "content": "6.3 资产负债存量变化(积累)核算", "page": 28}, {"number": "6.3.1", "title": "资产负债存量变化(积累)核算概述", "content": "6.3.1 资产负债存量变化(积累)核算概述\n资产负债存量变化引起物量变化的原因：\n①核算期内经济交易引起的资产变化。【比如产品积累起来转化为资产】\n②交易之外的事件导致的物量变化。【如地下资产的发现】", "page": 28}, {"number": "6.3.2", "title": "资产其他物量变化核算", "content": "6.3.2 资产其他物量变化核算\n1.资产其他物量变化及其核算的意义\n资产其他物量变化：由经济交易之外的因素引起的资产或负债物量变化。", "page": 28}, {"number": "6.3.3", "title": "重估价核算", "content": "6.3.3 重估价核算\n1.重估价与持有损益\n重估价核算记录：由于价格水平变化引起的资产、负债和资产净值的价值变化。称为持\n有损益。\n持有损益：资产或负债的所有者由于持有资产或负债，被动承受价格变动对资产或负债\n价值影响的后果，所有者在其中并未对资产或负债采取任何加工或转换的行为。\n从核算来看，正确理解持有损益概念需要注意如下几点：\n①针对特定资产而计算的。每一笔资产/负债的持有损益的计算前提是该资产负债的数\n量和质量保持不变，但发生了价格的变化；\n②在核算期内的任何时段持有的资产都可能产生持有损益。既包括期初持有保持到期\n末的资产，又包括期初持有然后在期内处置、期内购置，持有到期末、期内购置随后又在期\n内处置掉的资产；\n③只是理论值，不一定是实际的损益。只有当资产和负债在市场上变现时，损益才能\n得到真正的实现。\n3.持有损益的分解\n(1)中性持有损益及其计算\n中性持有损益（NG）：假定该资产的价格变化幅度与一般物价水平的变化幅度相同，在这种情况下由资产价格变化引起的价值变化。记为 NG。\n计算公式：NG = p₀·q × (r_t / r₀ − 1)\n其中 p₀ 为期初资产价格，q 为资产数量，r₀ 为期初一篮子商品价格，r_t 为期末一篮子商品价格。\n\n从资产的购买力来看：不失一般性，假定数量为 q 的一笔资产在期初能够交换1单位的价格为 r₀ 的国民经济一篮子商品，故有 p₀·q = r₀。\n到期末，由于国民经济一篮子商品的价格上升到 r_t，该笔资产还能交换到1单位的全社会一篮子商品，必须有 p_t·q = r_t，该笔资产的期初价格与期末价格关系：p_t = p₀ × (r_t / r₀)。在这种价格变动下的持有损益恰为前面计算的中性持有损益。\n由此可知，中性持有损益的实质是为保持资产购买力不变而必须发生的持有损益。\n(2)实际持有损益及其计算\n实际持有损益（RG）：由资产价格的总变化中不同于全社会一般物价水平变化的部分所导致的持有损益。\n计算公式：RG = (p_t − p₀)·q − p₀·q × (r_t/r₀ − 1)\n即 RG = 名义持有损益 − 中性持有损益\n从资产购买力来看实际持有损益的含义。同样假定数量为q的一笔资产在期初能够交换1单位的价格为r₀的国民经济一篮子商品，故有 p₀·q = r₀。\n到期末，该资产的价格为p_t，国民经济一篮子商品的价格为r_t，则该笔资产实际能交换到 (p_t·q)/r_t\np\n单位的国民经济一篮子商品。相\n对于期初而言，该资产能够购买的国民经济一篮子商品变化了\nt\nt\nr\nq\np\n单位，其价值量为\nt\nt\nr\n经过简单的代数运算可得，该笔资产购买力从价值量看改变了 p_t·q − p₀·q·(r_t/r₀)。这正是前面计算的实际持有损益。\n由此可知，实际持有损益的实质是资产价格变动引致的实际购买力变动，换言之，实际\n持有损益衡量了一笔资产发生的超额资源价值。一般而言，不同机构单位会持有不同资产，\n不同资产有不同的价格变化，由此会导致各机构单位最终获得不同幅度的实际持有损益，进\n一步影响到各机构单位(部门)间资产占有份额发生变化。此类变化实质上是一种实际购买力\n的再分配，具有收入转移效应。\n(3)三种持有损益之间的关系\n名义持有损益（TG）= 中性持有损益（NG）+ 实际持有损益（RG）\n即 TG = NG + RG = (p_t − p₀)·q", "page": 28}, {"number": "6.4", "title": "资产负债表的应用分析", "content": "6.4 资产负债表的应用分析\n1.资本产出率计算：\n资本产出率 = 国内生产总值 / 非金融资产总额\n或 = 国内生产总值 / 国民财富", "page": 29}], "page": 26}, {"title": "第七章国际收支及国际投资头寸核算", "sections": [{"number": "7.1", "title": "对外经济核算的基本问题", "content": "7.1 对外经济核算的基本问题", "page": 30}, {"number": "7.1.1", "title": "常住性的识别", "content": "7.1.1 常住性的识别\n定义：又称居民，指在一个国家居住或者停留超过1 年的自然人、企业、团体等。\n常住：一个经济单位在一国具有经济利益中心，该单位就构成该国经济的一个常住单位。\n1.住户的常住性\n①取决于住户的住所所在地而不是工作所在地。\n②一个住户的所有成员必须是同一个国家的常住单位。住户的一个成员经常外出离开该\n国经济领土，但总是在一段时间后又回到住户中来，该成员仍是该国的常住居民。\n2.企业的常住性\n主要依据：该企业在哪个国家范围内长期从事经济活动。\n对于一国常住单位中拥有经营流动设备单位。如果这些单位长期在其他国家境内经营，\n且被所在国税务和工商部门认可，为东道国的常住单位；\n如果这些单位在国际水域或空间经营，为所属国的常住单位。\n3.政府单位的常住性\n一国的中央政府和各级地方政府所拥有的部门、机关，以及驻外使领馆、军事单位或其\n他政府实体。", "page": 30}, {"number": "7.1.2", "title": "对外经济活动与对外经济核算", "content": "7.1.2 对外经济活动与对外经济核算\n国际货币基金组织(IMF)倡导扩展对外经济核算的范围：\n①流量核算。主要是国际收支核算、数据以国际收支平衡表的形式呈现，集中记录一时\n期内发生的对外经济交易；\n②将核算内容扩展到存量，进行国际投资头寸核算，数据以国际投资头寸表的形式呈\n现。记录核算期期初和期末时点的对外资产负债状况及其当期变动。", "page": 30}, {"number": "7.1.3", "title": "对外经济核算的基本原则", "content": "7.1.3 对外经济核算的基本原则\n1.记录时间\n权责发生制原则：应在经济价值被创造、转移、交换或消灭时记录，而不是在有关款项\n实际收付时记录。原则上，对同一笔交易，交易双方都加以记录，并应在同一时点进行核算。\n2.记录价格\n对外经济核算遵循市场价格原则。\n①对于交易，要按照交易者之间商定实际价格来计价；\n②对于资产和负债存量，要按资产负债表对应时间的市场价格计价。\n3.记账单位\n对外交易核算的原始数据：用各种不同的货币单位表示的。在编制国际收支平衡表或国\n际投资头寸表时，要将这些不同的货币单位转换为统一的货币单位。", "page": 30}, {"number": "7.2", "title": "国际收支核算", "content": "7.2 国际收支核算", "page": 30}, {"number": "7.2.2", "title": "国际收支核算的内容组成及其对应关系", "content": "7.2.2 国际收支核算的内容组成及其对应关系\n国际收支平衡表包括两个基本部分：\n①经常账户：记录货物和服务进出口以及收入分配交易。\n具体区分为货物和服务、初次收入、二次收入三个项目；\n②资本和金融账户：包括资本账户和金融账户。\n资本账户：涉及各种非金融投资，记录资本转移和无形非生产资产的交易。\n金融账户：记录各种金融交易。包括直接投资、证券投资、其他投资和国际储备资产交\n易。", "page": 31}, {"number": "7.2.5", "title": "国际收支平衡表中的平衡关系", "content": "7.2.5 国际收支平衡表中的平衡关系\n各个账户内部的平衡关系：\n借方总额\n贷方总额\n项目差额\n账户之间的平衡关系：\n受复式记账原理影响，如果在任一项目之下画线，把国际收支平衡表分为两个部分。\n其线上所有项目差额的合计必然等于线下所有项目差额合计的相反数。画线的位置根据\n分析，灵活设定，一般认为线上项目是自主交易项目，即一国主动采取的交易，线下项目是\n调节项目，是为了给线上项目融资而发生的交易。\n经常账户差额 = −资本和金融账户差额", "page": 31}, {"number": "7.3", "title": "国际投资头寸核算", "content": "7.3 国际投资头寸核算\n全部国际投资头寸核算的内容平衡关系：\n净头寸 = 资产 − 负债", "page": 32}, {"number": "7.3.3", "title": "国际投资头寸与国际收支的关系", "content": "7.3.3 国际投资头寸与国际收支的关系\n1 国际收支中的金融交易是引起国际投资头寸变化的主要原因，构成国际收支与国际\n投资头寸之间在核算上的主要联系。二者在核算原则上是一致的，明确体现了流量核算与\n存量核算的对应关系。\n2 进一步还可从引致关系来看投资头寸与国际收支的关系。\n第一，对外资产负债：引起投资收益的发生及其在国际上的流动，形成对外支付的投\n资收益和从国外获得的投资收益。记录在国际收支平衡表的经常账户之中。\n投资头寸：决定国际收支核算之投资收益的主要因素。在其他因素不变的情况\n下，投资头寸的大小决定投资收益的大小，净投资头寸的正或负在一定程度上决定投资收益\n分配是净收入还是净支出。\n第二，在核算关系上，只有金融账户和储备资产账户与投资头寸具有直接联系。但国\n际收支核算采用复式记账方法，大部分对外交易体现为经常账户与金融账户、储备资产账户\n之间的借贷对应关系。\n在间接意义上，经常账户的记录数额也对国际投资头寸产生影响。", "page": 32}, {"number": "7.4", "title": "对外经济核算的分析应用", "content": "7.4 对外经济核算的分析应用\n1.对外经济核算计算公式\n衡量外债规模是否合理，关键是看以下几方面的指标：\n①反映外债结构的指标：通常用短期外债与外汇储备之比表示。100%是安全警戒线；\n外汇储备\n短期外债\n外债结构=\n②反映外债偿还能力的指标：包括负债率、债务率、偿债率。计算公式分别为：\n外汇总收入\n短期负债付息额\n当年中长期还本付息额\n偿债率\n收入\n货物和服务项下的外汇\n外债余额\n债务率\n国内生产总值\n外债余额\n负债率\n储蓄投资差与国际收支平衡差额对应关系：\n资本和金融账户差额\n资本形成\n总储蓄\nI\nS", "page": 32}], "page": 30}]}</script>
